<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Warrant Ledger · 選擇權投資儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0c0f1a;--bg2:#121626;--bg3:#181d2e;--surface:#1e2438;
  --border:rgba(197,163,98,.18);--border2:rgba(197,163,98,.08);
  --gold:#c5a362;--gold2:#e8cfa0;--gold-dim:rgba(197,163,98,.1);
  --text:#e8e4dc;--muted:#6e7a96;--muted2:#4a5268;
  --profit:#f0c060;--profit-bg:rgba(240,192,96,.08);--profit-border:rgba(240,192,96,.25);
  --loss:#f06090;--loss-bg:rgba(240,96,144,.07);--loss-border:rgba(240,96,144,.25);
  --accent:#7eb8e8;
  --r:10px;--shadow:0 6px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* Mesh background */
body::before{content:’’;position:fixed;inset:0;pointer-events:none;z-index:0;
background:
radial-gradient(ellipse 70% 45% at 85% 5%,rgba(197,163,98,.07) 0%,transparent 55%),
radial-gradient(ellipse 55% 65% at 5% 85%,rgba(100,130,210,.05) 0%,transparent 55%),
radial-gradient(ellipse 40% 40% at 50% 50%,rgba(240,192,96,.02) 0%,transparent 60%),
repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(197,163,98,.018) 48px),
repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(197,163,98,.018) 48px);}
#app{position:relative;z-index:1}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#090c18 0%,#111526 60%,#160f24 100%);
border-bottom:1px solid var(–border);padding:0 28px;
display:flex;align-items:center;justify-content:space-between;
height:66px;position:sticky;top:0;z-index:200;
box-shadow:0 2px 40px rgba(0,0,0,.6)}
.logo-row{display:flex;align-items:center;gap:12px}
/* iPhone-style logo: filled square with ◈ */
.logo-mark{width:38px;height:38px;border-radius:9px;
background:linear-gradient(135deg,#d4a843 0%,#7a5220 100%);
display:flex;align-items:center;justify-content:center;
font-size:19px;color:#fff;font-weight:700;
box-shadow:0 0 0 1px rgba(255,255,255,.12),0 3px 14px rgba(197,163,98,.35)}
.logo-text{font-family:‘Cormorant Garamond’,serif;font-size:21px;font-weight:700;color:var(–gold2);letter-spacing:.5px}
.logo-sub{font-size:9.5px;letter-spacing:2.5px;color:var(–muted);text-transform:uppercase;margin-top:1px}
.hdr-nums{display:flex;gap:24px}
.hnum{text-align:right}
.hnum-lbl{font-size:9px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.hnum-val{font-family:‘Cormorant Garamond’,serif;font-size:20px;font-weight:700}

/* ── NAV ── */
nav{background:var(–bg2);border-bottom:1px solid var(–border);padding:0 28px;display:flex;gap:0;overflow-x:auto}
.nb{background:transparent;border:none;border-bottom:2px solid transparent;
color:var(–muted);padding:15px 18px;cursor:pointer;
font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:500;
white-space:nowrap;transition:all .18s}
.nb:hover{color:var(–gold2)}
.nb.active{color:var(–gold);border-bottom-color:var(–gold);font-weight:600}

/* ── BODY ── */
.body{padding:24px 28px}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:14px;margin-bottom:22px}
.scard{background:var(–bg2);border:1px solid var(–border);border-radius:var(–r);
padding:18px 20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default}
.scard:hover{transform:translateY(-2px);box-shadow:var(–shadow)}
.scard::after{content:’’;position:absolute;top:-20px;right:-20px;
width:90px;height:90px;border-radius:50%;pointer-events:none;
background:radial-gradient(circle,rgba(197,163,98,.1),transparent 70%)}
.sc-lbl{font-size:9px;letter-spacing:2.5px;color:var(–muted);text-transform:uppercase;margin-bottom:9px}
.sc-val{font-family:‘Cormorant Garamond’,serif;font-size:30px;font-weight:700;line-height:1;letter-spacing:-.3px}
.sc-sub{font-size:11px;color:var(–muted);margin-top:7px}
.sc-bar{height:2px;background:rgba(197,163,98,.12);border-radius:2px;margin-top:12px;overflow:hidden}
.sc-bar-fill{height:100%;background:linear-gradient(90deg,var(–gold),var(–gold2));border-radius:2px;transition:width .7s ease}
.cv-profit{color:var(–profit)}
.cv-loss{color:var(–loss)}
.cv-gold{color:var(–gold)}
.cv-blue{color:var(–accent)}

/* ── SECTION ── */
.sec{background:var(–bg2);border:1px solid var(–border);border-radius:var(–r);
overflow:hidden;margin-bottom:18px;box-shadow:0 3px 20px rgba(0,0,0,.3)}
.sec-hd{padding:14px 22px;border-bottom:1px solid var(–border2);
display:flex;align-items:center;justify-content:space-between;
background:linear-gradient(90deg,var(–bg3),var(–bg2))}
.sec-title{font-family:‘Cormorant Garamond’,serif;font-size:16px;font-weight:600;color:var(–gold2);letter-spacing:.3px}
.sec-sub{font-size:11.5px;color:var(–muted)}
.sec-action{font-size:12px;color:var(–gold);cursor:pointer;border:1px solid var(–border);
background:var(–gold-dim);padding:4px 12px;border-radius:6px;transition:all .15s}
.sec-action:hover{background:rgba(197,163,98,.18)}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{background:var(–bg3);color:var(–muted);font-size:9.5px;letter-spacing:2px;
text-transform:uppercase;padding:11px 14px;text-align:left;
border-bottom:1px solid var(–border);white-space:nowrap;font-weight:500}
tbody tr{transition:background .12s}
tbody tr:hover{background:rgba(197,163,98,.04)}
td{padding:11px 14px;border-bottom:1px solid var(–border2);vertical-align:middle}
.td-name{font-weight:600;color:var(–gold2);white-space:nowrap}
.td-date{color:var(–muted);font-size:12px;white-space:nowrap}

/* ── BADGES ── */
.bdg{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12.5px;font-weight:700}
.bdg-p{background:var(–profit-bg);color:var(–profit);border:1px solid var(–profit-border)}
.bdg-l{background:var(–loss-bg);color:var(–loss);border:1px solid var(–loss-border)}
.bdg-n{background:rgba(110,122,150,.1);color:var(–muted);border:1px solid rgba(110,122,150,.2)}

/* ── EDITABLE CELLS ── */
.ei{background:rgba(197,163,98,.07);border:1px solid rgba(197,163,98,.2);
color:var(–text);padding:4px 9px;border-radius:6px;
font-family:‘DM Sans’,sans-serif;font-size:13.5px;
width:90px;text-align:center;outline:none;transition:border-color .18s}
.ei:focus{border-color:var(–gold);box-shadow:0 0 0 2px rgba(197,163,98,.14)}
.ei.wide{width:140px;text-align:left}
.ei.med{width:78px}
.upd-btn{background:var(–gold-dim);border:1px solid rgba(197,163,98,.3);color:var(–gold);
padding:4px 9px;border-radius:6px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s}
.upd-btn:hover{background:rgba(197,163,98,.2);border-color:var(–gold)}
.del-btn{background:rgba(240,96,144,.07);border:1px solid rgba(240,96,144,.2);color:var(–loss);
padding:4px 9px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .15s}
.del-btn:hover{background:rgba(240,96,144,.15)}
.add-row-btn{background:rgba(197,163,98,.07);border:1px dashed rgba(197,163,98,.3);color:var(–gold);
width:100%;padding:10px;text-align:center;cursor:pointer;font-size:13px;transition:all .15s}
.add-row-btn:hover{background:rgba(197,163,98,.13)}
@keyframes flash{0%,100%{background:transparent}50%{background:rgba(240,192,96,.12)}}
.flash{animation:flash .5s ease}

/* ── CHART ── */
.chart-ctrl{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.cg{display:flex;flex-direction:column;gap:5px}
.cg-lbl{font-size:9px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.tog-row{display:flex;gap:6px}
.tog{background:var(–bg3);border:1px solid var(–border);color:var(–muted);
padding:8px 16px;border-radius:7px;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:13px;transition:all .18s}
.tog.active{background:var(–gold-dim);border-color:var(–gold);color:var(–gold);font-weight:600}
.di{background:var(–bg3);border:1px solid var(–border);color:var(–text);
padding:8px 12px;border-radius:7px;font-family:‘DM Sans’,sans-serif;font-size:13px;outline:none;width:145px}
.di:focus{border-color:var(–gold)}
.clr-btn{background:transparent;border:1px solid var(–border);color:var(–muted);
padding:8px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-family:‘DM Sans’,sans-serif}
.filter-banner{background:rgba(197,163,98,.06);border:1px solid rgba(197,163,98,.25);
border-radius:8px;padding:8px 16px;font-size:12px;color:var(–gold);margin-bottom:14px;display:none}
.cw{padding:22px;background:var(–bg2)}

/* ── MODAL (add row) ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(–bg2);border:1px solid var(–border);border-radius:14px;
padding:28px;width:min(480px,95vw);box-shadow:0 16px 60px rgba(0,0,0,.6)}
.modal-title{font-family:‘Cormorant Garamond’,serif;font-size:20px;color:var(–gold2);margin-bottom:22px;font-weight:600}
.f-grid{display:flex;flex-direction:column;gap:14px}
.f-row{display:flex;gap:12px;flex-wrap:wrap}
.f-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
.f-lbl{font-size:9px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.f-inp{background:var(–bg3);border:1px solid var(–border);color:var(–text);
padding:9px 13px;border-radius:8px;font-family:‘DM Sans’,sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .18s}
.f-inp:focus{border-color:var(–gold);box-shadow:0 0 0 2px rgba(197,163,98,.12)}
.dir-row{display:flex;gap:8px}
.dir-b{flex:1;padding:9px;border-radius:8px;border:1px solid var(–border);
background:var(–bg3);color:var(–muted);cursor:pointer;font-size:14px;font-family:‘DM Sans’,sans-serif;transition:all .18s;text-align:center}
.dir-b.buy.a{background:rgba(240,192,96,.1);border-color:rgba(240,192,96,.4);color:var(–profit)}
.dir-b.sell.a{background:rgba(240,96,144,.1);border-color:rgba(240,96,144,.4);color:var(–loss)}
.prev-box{background:rgba(197,163,98,.06);border:1px solid rgba(197,163,98,.2);border-radius:8px;
padding:10px 14px;font-size:13px;color:var(–gold);display:none}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.ok-btn{background:linear-gradient(135deg,var(–gold) 0%,#8a6020 100%);color:#0c0f1a;
border:none;padding:11px 28px;border-radius:8px;font-family:‘DM Sans’,sans-serif;
font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.2px}
.ok-btn:hover{opacity:.88}
.no-btn{background:var(–bg3);border:1px solid var(–border);color:var(–muted);
padding:11px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-family:‘DM Sans’,sans-serif}

/* ── Misc ── */
.gold-line{height:1px;background:linear-gradient(90deg,transparent,rgba(197,163,98,.4),transparent);margin:4px 0 20px}
.tip{font-size:11px;color:var(–muted);padding:10px 22px;border-top:1px solid var(–border2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(–bg)}
::-webkit-scrollbar-thumb{background:rgba(197,163,98,.25);border-radius:3px}
select.f-inp{appearance:auto}
</style>

</head>
<body>
<div id="app">

<!-- Header -->

<header>
  <div class="logo-row">
    <div class="logo-mark">◈</div>
    <div>

<div class="body">

</div>

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const mv   = p => +(p.price * p.shares).toFixed(2);
const hc   = p => +(p.cost  * p.shares * -1).toFixed(2);  // recalc from cost×shares
const ep   = p => +(mv(p) + hc(p)).toFixed(2);             // mv - abs(holdCost)
const eroi = p => +((ep(p)/Math.abs(hc(p)))*100).toFixed(2);
const be   = p => +(Math.abs(hc(p))/p.shares).toFixed(3);

const fmt  = (n,d=0) => (+n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct  = n => `${n>=0?'+':''}${(+n).toFixed(2)}%`;
const pc   = n => n>=0?'cv-profit':'cv-loss';
const bdg  = (n,txt) => `<span class="bdg ${n>=0?'bdg-p':'bdg-l'}">${txt}</span>`;

// Total closed profit (dynamic)
const totalClosed  = () => closedTrades.reduce((s,t)=>s+t.profit,0);
const totalOpenEst = () => openPos.filter(p=>p.product!=='公勝保經').reduce((s,p)=>s+ep(p),0);
const wins = () => closedTrades.filter(t=>t.profit>0).length;
const winRate = () => closedTrades.length ? (wins()/closedTrades.length*100).toFixed(1) : '0.0';
const avgRoi  = () => closedTrades.length ? (closedTrades.reduce((s,t)=>s+t.roi,0)/closedTrades.length).toFixed(1) : '0.0';
const bestTrade = () => [...closedTrades].sort((a,b)=>b.profit-a.profit)[0];

  pages.forEach(p=>{document.getElementById('pv-'+p).style.display=p===name?'':'none'});

}

function renderOpenRows(){
  const b=document.getElementById('open-body');
  if(!b) return;

    <td style="white-space:nowrap;display:flex;gap:6px;padding:8px 14px">

      <button class="del-btn" onclick="delOpen(${p.id})">刪除</button>
    </td>
  </tr>`).join('');
}

function applyOpen(id){
  const p=openPos.find(o=>o.id===id);
  if(!p) return;
  const nm=document.getElementById('pn-'+id)?.value.trim()||p.product;
  const sh=parseFloat(document.getElementById('ps-'+id)?.value)||p.shares;
  const pr=parseFloat(document.getElementById('pp-'+id)?.value)||p.price;
  const co=parseFloat(document.getElementById('pc-'+id)?.value)||p.cost;
  p.product=nm; p.shares=sh; p.price=pr; p.cost=co;
  // update cells
  const row=document.getElementById('or-'+id);
  if(row){row.style.background=ep(p)>=0?'var(--profit-bg)':'var(--loss-bg)';row.classList.remove('flash');void row.offsetWidth;row.classList.add('flash')}
  ['mv','hc','ep','er','be'].forEach(k=>{
    const el=document.getElementById(k+'-'+id); if(!el) return;
    if(k==='mv') el.textContent=fmt(mv(p));
    if(k==='hc') el.textContent=fmt(hc(p));
    if(k==='ep') el.innerHTML=bdg(ep(p),(ep(p)>=0?'+':'')+fmt(ep(p)));
    if(k==='er'){el.textContent=pct(eroi(p));el.className=pc(eroi(p));el.style.fontWeight='700'}
    if(k==='be') el.textContent=be(p);
  });
  updateHeader();
  if(document.getElementById('pv-overview').style.display!=='none') renderOverview();
}

function delOpen(id){
  if(!confirm('確定刪除此部位？')) return;
  openPos=openPos.filter(p=>p.id!==id);
  renderOpenRows(); updateHeader();
}

function applyClosed(id){
  const t=closedTrades.find(x=>x.id===id); if(!t) return;
  t.date   = document.getElementById('cd-'+id)?.value||t.date;
  t.name   = document.getElementById('cn-'+id)?.value.trim()||t.name;
  t.avgP   = parseFloat(document.getElementById('cap-'+id)?.value)||t.avgP;
  t.shares = parseFloat(document.getElementById('csh-'+id)?.value)||t.shares;
  t.revenue= +(t.avgP*t.shares).toFixed(0);
  // cost stays unless user also edits profit directly — keep profit/roi from last save
  const cells={
    'crv': fmt(t.revenue),
    'cco': fmt(t.cost),
    'cpr': bdg(t.profit,(t.profit>=0?'+':'')+fmt(t.profit)),
  };
  Object.entries(cells).forEach(([k,v])=>{const el=document.getElementById(k+'-'+id);if(el)el.innerHTML=v});
  const rEl=document.getElementById('cri-'+id);
  if(rEl){rEl.textContent=pct(t.roi);rEl.className=pc(t.roi);rEl.style.fontWeight='700'}
  const row=document.getElementById('cr-'+id);
  if(row){row.style.background=t.profit>=0?'var(--profit-bg)':'var(--loss-bg)';row.classList.remove('flash');void row.offsetWidth;row.classList.add('flash')}
  updateHeader();
  if(document.getElementById('pv-overview').style.display!=='none') renderOverview();
}

function delClosed(id){
  if(!confirm('確定刪除此筆記錄？')) return;
  closedTrades=closedTrades.filter(t=>t.id!==id);
  renderClosedRows(); updateHeader();
  if(document.getElementById('pv-overview').style.display!=='none') renderOverview();
}

function mPrev(){
  const box=document.getElementById('m-prev'); if(!box) return;
  if(modalMode==='open'){
    const sh=parseFloat(document.getElementById('m-shares')?.value||0);
    const pr=parseFloat(document.getElementById('m-price')?.value||0);
    const co=parseFloat(document.getElementById('m-cost')?.value||0);
    if(sh&&pr&&co){
      const mv2=pr*sh, hc2=co*sh, ep2=mv2-hc2;
      box.style.display='block';
      box.innerHTML=`市值：<strong>${fmt(mv2)}</strong>　持有成本：<strong>${fmt(-hc2)}</strong>　預估損益：<strong style="color:${ep2>=0?'var(--profit)':'var(--loss)'}">${ep2>=0?'+':''}${fmt(ep2)}</strong>`;
    } else box.style.display='none';
  } else {
    const sh=parseFloat(document.getElementById('m-shares')?.value||0);
    const ap=parseFloat(document.getElementById('m-avgp')?.value||0);
    const pr=parseFloat(document.getElementById('m-profit')?.value||0);
    if(sh&&ap){box.style.display='block';box.innerHTML=`成交金額：<strong>${fmt(sh*ap)}</strong>　損益：<strong style="color:${pr>=0?'var(--profit)':'var(--loss)'}">${pr>=0?'+':''}${fmt(pr)}</strong>`}
    else box.style.display='none';
  }
}

function submitOpen(){
  const product=document.getElementById('m-product')?.value.trim();
  const shares=parseFloat(document.getElementById('m-shares')?.value);
  const price=parseFloat(document.getElementById('m-price')?.value);
  const cost=parseFloat(document.getElementById('m-cost')?.value);
  if(!product||!shares||!price||!cost){alert('請填寫所有欄位');return}
  openPos.push({id:++nextOpenId,product,shares,price,cost});
  closeModal();
  if(document.getElementById('pv-open').style.display!=='none') renderOpen();
  updateHeader();
}

function submitClosed(){
  const date=(document.getElementById('m-date')?.value||'').replace(/-/g,'/');
  const name=document.getElementById('m-product')?.value.trim();
  const avgP=parseFloat(document.getElementById('m-avgp')?.value);
  const shares=parseFloat(document.getElementById('m-shares')?.value);
  const cost=parseFloat(document.getElementById('m-cost')?.value)||0;
  const profit=parseFloat(document.getElementById('m-profit')?.value)||0;
  const roi=parseFloat(document.getElementById('m-roi')?.value)||0;
  if(!date||!name||!avgP||!shares){alert('請填寫日期、商品、均價、股數');return}
  closedTrades.push({id:++nextCloseId,date,name,avgP,shares,revenue:+(avgP*shares).toFixed(0),cost,profit,roi});
  closeModal();
  if(document.getElementById('pv-closed').style.display!=='none') renderClosed();
  if(document.getElementById('pv-overview').style.display!=='none') renderOverview();
  updateHeader();
}

function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

// ═══════════════════════════════════════════════════════════════
// CHART — date range filter
// ═══════════════════════════════════════════════════════════════
let chartInst=null, chartMode='cumulative', dateFrom='', dateTo='';

function buildChartData(){
  const byDate={};
  closedTrades.forEach(t=>{byDate[t.date]=(byDate[t.date]||0)+t.profit});
  let cum=0;
  let rows=Object.keys(byDate).sort().map(d=>{
    cum+=byDate[d];
    return{fullDate:d,label:d.slice(5),daily:byDate[d],cumulative:cum,count:closedTrades.filter(t=>t.date===d).length};
  });
  const norm=s=>s.replace(/[-/]/g,'');
  if(dateFrom) rows=rows.filter(r=>norm(r.fullDate)>=norm(dateFrom));
  if(dateTo)   rows=rows.filter(r=>norm(r.fullDate)<=norm(dateTo));
  // recalculate cumulative after filter
  let c=0;
  return rows.map(r=>{c+=r.daily;return{...r,cumulative:c}});
}

function renderChart(){
  document.getElementById('pv-chart').innerHTML=`
  <div class="chart-ctrl">
    <div class="cg">
      <span class="cg-lbl">圖表類型</span>
      <div class="tog-row">
        <button class="tog ${chartMode==='cumulative'?'active':''}" onclick="setMode('cumulative')">📈 累計走勢</button>
        <button class="tog ${chartMode==='daily'?'active':''}" onclick="setMode('daily')">📊 每日損益</button>
      </div>
    </div>
    <div class="cg">
      <span class="cg-lbl">起始日期</span>
      <input type="date" class="di" id="df" value="${dateFrom}" onchange="setDF(this.value)"/>
    </div>
    <div class="cg">
      <span class="cg-lbl">結束日期</span>
      <input type="date" class="di" id="dt" value="${dateTo}" onchange="setDT(this.value)"/>
    </div>
    <div class="cg" style="justify-content:flex-end;padding-bottom:1px">
      <span class="cg-lbl">&nbsp;</span>
      <button class="clr-btn" onclick="clearDates()">✕ 清除範圍</button>
    </div>
  </div>
  <div class="filter-banner" id="fb"></div>
  <div class="sec">
    <div class="sec-hd">
      <span class="sec-title" id="ct-title">累計損益走勢</span>
      <span class="sec-sub" id="ct-sub"></span>
    </div>
    <div class="cw"><canvas id="mc" height="270"></canvas></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><span class="sec-title">各交易日明細</span></div>
    <div class="tw"><table>
      <thead><tr><th>日期</th><th>當日損益</th><th>累計損益</th><th>筆數</th></tr></thead>
      <tbody id="ctbl"></tbody>
    </table></div>
  </div>`;
  drawChart();
}

function drawChart(){
  const data=buildChartData();
  // banner
  const fb=document.getElementById('fb');
  if(fb){
    if(dateFrom||dateTo){
      fb.style.display='block';
      fb.textContent=`篩選範圍：${dateFrom||'最早'} ～ ${dateTo||'最新'}　共 ${data.length} 個交易日`;
    } else fb.style.display='none';
  }
  // title
  const tEl=document.getElementById('ct-title');
  if(tEl) tEl.textContent=chartMode==='cumulative'?'累計損益走勢':'每日損益（含數值標籤）';
  // sub — show range sum
  const rangeSum=data.reduce((s,r)=>s+r.daily,0);
  const sEl=document.getElementById('ct-sub');
  if(sEl&&data.length) sEl.innerHTML=`範圍內合計：<span style="color:${rangeSum>=0?'var(--profit)':'var(--loss)'};font-weight:700">${rangeSum>=0?'+':''}${fmt(rangeSum)}</span>`;
  // toggle btns
  document.querySelectorAll('.tog').forEach((b,i)=>b.classList.toggle('active',[chartMode==='cumulative',chartMode==='daily'][i]));

  if(chartInst){chartInst.destroy();chartInst=null}
  const ctx=document.getElementById('mc'); if(!ctx) return;
  const labels=data.map(d=>d.label);
  const daily=data.map(d=>d.daily);
  const cumul=data.map(d=>d.cumulative);
  const G='rgba(197,163,98,';

  if(chartMode==='cumulative'){
    chartInst=new Chart(ctx,{type:'line',data:{labels,datasets:[{
      label:'累計損益',data:cumul,
      borderColor:G+'1)',backgroundColor:G+'0.07)',
      pointBackgroundColor:G+'1)',pointRadius:5,pointHoverRadius:8,
      borderWidth:2.5,fill:true,tension:.35}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#1d2238',borderColor:G+'0.4)',borderWidth:1,
          titleColor:'#e8cfa0',bodyColor:'#e8e4dc',padding:10,
          callbacks:{label:c=>`累計：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}}},
        scales:{x:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:11}}},
                y:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:11}}}}}});
  } else {
    chartInst=new Chart(ctx,{type:'bar',data:{labels,datasets:[{
      label:'每日損益',data:daily,
      backgroundColor:daily.map(v=>v>=0?'rgba(240,192,96,.45)':'rgba(240,96,144,.45)'),
      borderColor:daily.map(v=>v>=0?'rgba(240,192,96,.9)':'rgba(240,96,144,.9)'),
      borderWidth:1.5,borderRadius:5}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#1d2238',borderColor:G+'0.4)',borderWidth:1,
          titleColor:'#e8cfa0',bodyColor:'#e8e4dc',padding:10,
          callbacks:{label:c=>`當日：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}}},
        scales:{x:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:11}}},
                y:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:11}}}},
        animation:{onComplete:()=>{
          if(!chartInst) return;
          const meta=chartInst.getDatasetMeta(0);
          const c2=chartInst.ctx;
          c2.save();c2.font='bold 11px DM Sans';c2.textAlign='center';
          meta.data.forEach((bar,i)=>{
            const v=daily[i];
            c2.fillStyle=v>=0?'#f0c060':'#f06090';
            c2.fillText((v>=0?'+':'')+v.toLocaleString(),bar.x,v>=0?bar.y-5:bar.y+bar.height+14);
          });
          c2.restore();
        }}
      }});
  }
  // table
  const tb=document.getElementById('ctbl');
  if(tb) tb.innerHTML=data.map(r=>`<tr style="background:${r.daily>=0?'var(--profit-bg)':'var(--loss-bg)'}">
    <td class="td-date">${r.fullDate}</td>
    <td>${bdg(r.daily,(r.daily>=0?'+':'')+fmt(r.daily))}</td>
    <td class="${pc(r.cumulative)}" style="font-weight:700">${r.cumulative>=0?'+':''}${fmt(r.cumulative)}</td>
    <td style="color:var(--muted)">${r.count}</td>
  </tr>`).join('');
}

function setMode(m){chartMode=m;drawChart()}
function setDF(v){dateFrom=v;drawChart()}
function setDT(v){dateTo=v;drawChart()}
function clearDates(){dateFrom='';dateTo='';const a=document.getElementById('df'),b=document.getElementById('dt');if(a)a.value='';if(b)b.value='';drawChart()}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
updateHeader();
renderOverview();
</script>
