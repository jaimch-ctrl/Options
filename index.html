<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>選擇權投資儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #0f1117;
  --bg2:      #161a24;
  --bg3:      #1d2232;
  --surface:  #212639;
  --border:   rgba(197,163,98,0.18);
  --gold:     #c5a362;
  --gold2:    #e8cfa0;
  --gold-dim: rgba(197,163,98,0.12);
  --text:     #e8e4dc;
  --muted:    #7a8299;
  --profit:   #4ade80;
  --profit-bg:rgba(74,222,128,0.08);
  --loss:     #f87171;
  --loss-bg:  rgba(248,113,113,0.08);
  --radius:   12px;
  --shadow:   0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── Decorative background ── */
body::before{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:0;
background:
radial-gradient(ellipse 60% 40% at 80% 10%, rgba(197,163,98,0.07) 0%, transparent 60%),
radial-gradient(ellipse 50% 60% at 10% 80%, rgba(74,100,180,0.06) 0%, transparent 55%),
repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(197,163,98,0.025) 40px),
repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(197,163,98,0.025) 40px);
}
#app{position:relative;z-index:1}

/* ── Header ── */
header{
background:linear-gradient(135deg,#0d1020 0%,#161a2e 60%,#1a1628 100%);
border-bottom:1px solid var(–border);
padding:0 32px;display:flex;align-items:center;justify-content:space-between;
height:70px;position:sticky;top:0;z-index:100;
box-shadow:0 2px 32px rgba(0,0,0,0.5);
}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-icon{
width:36px;height:36px;border-radius:8px;
background:linear-gradient(135deg,var(–gold) 0%,#8a6830 100%);
display:flex;align-items:center;justify-content:center;font-size:16px;
box-shadow:0 2px 12px rgba(197,163,98,0.3);
}
.logo-text{font-family:‘Cormorant Garamond’,serif;font-size:20px;font-weight:700;letter-spacing:1px;color:var(–gold2)}
.logo-sub{font-size:10px;letter-spacing:3px;color:var(–muted);text-transform:uppercase;margin-top:1px}
.header-stats{display:flex;gap:28px;align-items:center}
.hstat{text-align:right}
.hstat-label{font-size:9px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.hstat-val{font-size:18px;font-weight:600;font-family:‘Cormorant Garamond’,serif;letter-spacing:.5px}

/* ── Nav ── */
nav{
background:var(–bg2);border-bottom:1px solid var(–border);
padding:0 32px;display:flex;gap:2px;overflow-x:auto;
}
.nav-btn{
background:transparent;border:none;color:var(–muted);padding:16px 20px;
cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:500;
letter-spacing:.3px;border-bottom:2px solid transparent;transition:all .2s;
white-space:nowrap;
}
.nav-btn:hover{color:var(–gold2)}
.nav-btn.active{color:var(–gold);border-bottom-color:var(–gold);font-weight:600}

/* ── Layout ── */
.body{padding:28px 32px}

/* ── Stat cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{
background:var(–bg2);border:1px solid var(–border);border-radius:var(–radius);
padding:20px 22px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(–shadow)}
.stat-card::before{
content:’’;position:absolute;top:0;right:0;width:80px;height:80px;
background:radial-gradient(circle at top right,var(–gold-dim),transparent 70%);
}
.stat-card.accent::before{background:radial-gradient(circle at top right,rgba(74,222,128,0.08),transparent 70%)}
.stat-label{font-size:9px;letter-spacing:2.5px;color:var(–muted);text-transform:uppercase;margin-bottom:10px}
.stat-val{font-family:‘Cormorant Garamond’,serif;font-size:32px;font-weight:700;line-height:1;letter-spacing:-.5px}
.stat-val.profit{color:var(–profit)}
.stat-val.loss{color:var(–loss)}
.stat-val.gold{color:var(–gold)}
.stat-sub{font-size:11px;color:var(–muted);margin-top:8px}
.stat-bar{height:2px;background:var(–border);border-radius:2px;margin-top:14px;overflow:hidden}
.stat-bar-fill{height:100%;background:linear-gradient(90deg,var(–gold),var(–gold2));border-radius:2px;transition:width .6s ease}

/* ── Section ── */
.section{background:var(–bg2);border:1px solid var(–border);border-radius:var(–radius);overflow:hidden;margin-bottom:20px;box-shadow:var(–shadow)}
.section-head{
padding:16px 24px;border-bottom:1px solid var(–border);
display:flex;align-items:center;justify-content:space-between;
background:linear-gradient(90deg,var(–bg3),var(–bg2));
}
.section-title{font-family:‘Cormorant Garamond’,serif;font-size:16px;font-weight:600;color:var(–gold2);letter-spacing:.5px}
.section-sub{font-size:12px;color:var(–muted)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{
background:var(–bg3);color:var(–muted);font-size:10px;letter-spacing:2px;
text-transform:uppercase;padding:12px 16px;text-align:left;
border-bottom:1px solid var(–border);white-space:nowrap;font-weight:500;
}
tbody tr{transition:background .15s}
tbody tr:hover{background:rgba(197,163,98,0.05)}
td{padding:12px 16px;border-bottom:1px solid rgba(197,163,98,0.06);vertical-align:middle}
.td-name{font-weight:600;color:var(–gold2);white-space:nowrap}
.td-date{color:var(–muted);white-space:nowrap;font-size:12px}
.td-num{font-variant-numeric:tabular-nums}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12.5px;font-weight:700}
.badge.profit{background:var(–profit-bg);color:var(–profit);border:1px solid rgba(74,222,128,0.2)}
.badge.loss{background:var(–loss-bg);color:var(–loss);border:1px solid rgba(248,113,113,0.2)}

/* ── Editable price ── */
.price-cell{display:flex;align-items:center;gap:8px}
.price-input{
background:rgba(197,163,98,0.08);border:1px solid var(–border);
color:var(–gold2);padding:4px 10px;border-radius:6px;
font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:600;
width:80px;text-align:center;outline:none;transition:border-color .2s;
}
.price-input:focus{border-color:var(–gold);box-shadow:0 0 0 2px rgba(197,163,98,0.15)}
.update-btn{
background:var(–gold-dim);border:1px solid var(–border);color:var(–gold);
padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;
letter-spacing:.5px;transition:all .15s;white-space:nowrap;
}
.update-btn:hover{background:rgba(197,163,98,0.2);border-color:var(–gold)}
.flash{animation:flash .5s ease}
@keyframes flash{0%,100%{background:transparent}50%{background:rgba(74,222,128,0.15)}}

/* ── Chart ── */
.chart-controls{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px}
.ctrl-group{display:flex;flex-direction:column;gap:6px}
.ctrl-label{font-size:9px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.toggle-row{display:flex;gap:6px}
.toggle-btn{
background:var(–bg3);border:1px solid var(–border);color:var(–muted);
padding:8px 18px;border-radius:7px;cursor:pointer;font-family:‘DM Sans’,sans-serif;
font-size:13px;transition:all .18s;
}
.toggle-btn.active{background:var(–gold-dim);border-color:var(–gold);color:var(–gold);font-weight:600}
.date-input{
background:var(–bg3);border:1px solid var(–border);color:var(–text);
padding:8px 14px;border-radius:7px;font-family:‘DM Sans’,sans-serif;
font-size:13px;outline:none;
}
.date-input:focus{border-color:var(–gold)}
.clear-btn{
background:transparent;border:1px solid var(–border);color:var(–muted);
padding:8px 14px;border-radius:7px;cursor:pointer;font-size:12px;
}
.filter-info{
background:rgba(197,163,98,0.06);border:1px solid rgba(197,163,98,0.25);
border-radius:8px;padding:8px 16px;font-size:12px;color:var(–gold);
margin-bottom:16px;display:none;
}
.chart-wrap{padding:24px;background:var(–bg2)}
canvas{border-radius:8px}

/* ── Add form ── */
.form-wrap{padding:28px;display:flex;flex-direction:column;gap:18px;max-width:480px}
.form-label{font-size:9px;letter-spacing:2px;color:var(–muted);text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{
background:var(–bg3);border:1px solid var(–border);color:var(–text);
padding:10px 14px;border-radius:8px;font-family:‘DM Sans’,sans-serif;
font-size:14px;outline:none;width:100%;transition:border-color .2s;
}
.form-input:focus{border-color:var(–gold);box-shadow:0 0 0 2px rgba(197,163,98,0.12)}
.dir-row{display:flex;gap:8px}
.dir-btn{
flex:1;padding:10px;border-radius:8px;border:1px solid var(–border);
background:var(–bg3);color:var(–muted);cursor:pointer;font-size:14px;
font-family:‘DM Sans’,sans-serif;transition:all .18s;text-align:center;font-weight:500;
}
.dir-btn.buy.active{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.4);color:var(–profit)}
.dir-btn.sell.active{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.4);color:var(–loss)}
.preview-box{background:rgba(197,163,98,0.06);border:1px solid rgba(197,163,98,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(–gold)}
.submit-btn{
background:linear-gradient(135deg,var(–gold) 0%,#8a6830 100%);
color:#0f1117;border:none;padding:12px 32px;border-radius:8px;
font-family:‘DM Sans’,sans-serif;font-size:15px;font-weight:700;
cursor:pointer;letter-spacing:.3px;transition:opacity .18s;
}
.submit-btn:hover{opacity:.88}
.cancel-btn{background:var(–bg3);border:1px solid var(–border);color:var(–muted);padding:12px 22px;border-radius:8px;cursor:pointer;font-size:14px;font-family:‘DM Sans’,sans-serif}

/* ── Decorative divider ── */
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(–gold),transparent);margin:6px 0 22px;opacity:.5}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(–bg)}
::-webkit-scrollbar-thumb{background:rgba(197,163,98,0.3);border-radius:3px}
</style>

</head>
<body>
<div id="app">

<header>
  <div class="logo-area">
    <div class="logo-icon">◈</div>
    <div>
      <div class="logo-text">Warrant Ledger</div>

    </div>
  </div>
  <div class="header-stats" id="hdr-stats"></div>
</header>

<nav id="main-nav">
  <button class="nav-btn active" onclick="showTab('overview')">總覽</button>
  <button class="nav-btn" onclick="showTab('open')">持倉明細</button>
  <button class="nav-btn" onclick="showTab('closed')">已實現損益</button>
  <button class="nav-btn" onclick="showTab('chart')">圖表分析</button>
  <button class="nav-btn" onclick="showTab('add')">＋ 新增交易</button>
</nav>

<div class="body">
  <div id="tab-overview"></div>
  <div id="tab-open" style="display:none"></div>
  <div id="tab-closed" style="display:none"></div>
  <div id="tab-chart" style="display:none"></div>

</div>

const fmt  = (n,d=0) => n.toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct  = n => `${n>=0?'+':''}${n.toFixed(2)}%`;
const sgn  = n => n>=0?'profit':'loss';
const badge= (n,txt)=>`<span class="badge ${sgn(n)}">${txt}</span>`;

// ─── Header stats ────────────────────────────────────────────────────────────
function updateHeader(){
  const tc = closed.reduce((s,t)=>s+t.profit,0);
  const to = open.filter(p=>p.product!=='公勝保經').reduce((s,p)=>s+ep(p),0);
  document.getElementById('hdr-stats').innerHTML=`
    <div class="hstat">
      <div class="hstat-label">已實現損益</div>

    <div class="hstat">
      <div class="hstat-label">持倉預估</div>
      <div class="hstat-val" style="color:${to>=0?'var(--profit)':'var(--loss)'}">
        ${to>=0?'+':''}${fmt(to)}
      </div>

}

// ─── Tab routing ─────────────────────────────────────────────────────────────
const tabs = ['overview','open','closed','chart','add'];
function showTab(name){
  tabs.forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'':'none'});
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active', tabs[i]===name);
  });
  renders[name]();
}
const renders = {overview:renderOverview, open:renderOpen, closed:renderClosed, chart:renderChart, add:renderAdd};

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function renderOverview(){
  const tc  = closed.reduce((s,t)=>s+t.profit,0);
  const to  = open.filter(p=>p.product!=='公勝保經').reduce((s,p)=>s+ep(p),0);

  document.getElementById('tab-overview').innerHTML=`

      <thead><tr>
        <th>商品</th><th>持股數</th><th>現價</th><th>成本均價</th><th>預估損益</th><th>預估獲利率</th>
      </tr></thead>

      ${topOpen.map(p=>`<tr>
        <td class="td-name">${p.product}</td>
        <td>${fmt(p.shares)}</td>

        <td>${p.avgCost}</td>

// ─── OPEN POSITIONS ─────────────────────────────────────────────────────────
function renderOpen(){
  const el = document.getElementById('tab-open');
  el.innerHTML=`
  <div class="section">
    <div class="section-head">
      <span class="section-title">未平倉部位明細</span>
      <span class="section-sub">✏️ 點擊現價欄位即可修改 → 預估損益自動連動</span>
    </div>
    <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>商品</th><th>持股數</th><th>現價（可編輯）</th><th>成本均價</th>
        <th>市值</th><th>持有成本</th><th>預估損益</th><th>預估獲利率</th><th>損益平衡</th>
      </tr></thead>
      <tbody id="open-tbody"></tbody>
    </table>
    </div>
  </div>`;
  renderOpenRows();
}

function renderOpenRows(){
  const tbody = document.getElementById('open-tbody');
  if(!tbody) return;
  tbody.innerHTML = open.map(p=>`
    <tr id="open-row-${p.id}" style="background:${ep(p)>=0?'var(--profit-bg)':'var(--loss-bg)'}">
      <td class="td-name">${p.product}</td>
      <td>${fmt(p.shares)}</td>
      <td>
        <div class="price-cell">
          <input class="price-input" id="px-${p.id}" type="number" step="0.01" value="${p.currentPrice}"
            onkeydown="if(event.key==='Enter')applyPrice(${p.id})"/>
          <button class="update-btn" onclick="applyPrice(${p.id})">更新</button>
        </div>
      </td>
      <td>${p.avgCost}</td>
      <td>${fmt(mv(p))}</td>
      <td>${fmt(p.holdCost)}</td>
      <td id="ep-${p.id}">${badge(ep(p),(ep(p)>=0?'+':'')+fmt(ep(p)))}</td>
      <td id="roi-${p.id}" style="color:${eroi(p)>=0?'var(--profit)':'var(--loss)'};font-weight:700">${pct(eroi(p))}</td>
      <td>${be(p).toFixed(2)}</td>
    </tr>`).join('');
}

function applyPrice(id){
  const inp = document.getElementById('px-'+id);
  const newPrice = parseFloat(inp.value);
  if(isNaN(newPrice)||newPrice<=0) return;
  const p = open.find(o=>o.id===id);
  p.currentPrice = newPrice;
  // Update only the affected cells
  const row = document.getElementById('open-row-'+id);
  if(row) row.style.background = ep(p)>=0?'var(--profit-bg)':'var(--loss-bg)';
  const epEl  = document.getElementById('ep-'+id);
  const roiEl = document.getElementById('roi-'+id);
  if(epEl)  epEl.innerHTML  = badge(ep(p),(ep(p)>=0?'+':'')+fmt(ep(p)));
  if(roiEl){ roiEl.textContent=pct(eroi(p)); roiEl.style.color=eroi(p)>=0?'var(--profit)':'var(--loss)'; }
  // Flash effect
  if(row){ row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash'); }
  updateHeader();
  // Also refresh overview if visible
  if(document.getElementById('tab-overview').style.display!=='none') renderOverview();
}

// ─── CLOSED ──────────────────────────────────────────────────────────────────
function renderClosed(){
  const tc = closed.reduce((s,t)=>s+t.profit,0);
  document.getElementById('tab-closed').innerHTML=`
  <div class="section">
    <div class="section-head">
      <span class="section-title">已實現損益（${closed.length} 筆）</span>
      <span class="section-sub" style="color:var(--profit);font-weight:700">總計：+${fmt(tc)}</span>
    </div>
    <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>日期</th><th>商品全名</th><th>成交均價</th><th>成交股數</th>
        <th>成交價金</th><th>投資成本</th><th>損益</th><th>獲利率%</th>
      </tr></thead>
      <tbody>
      ${[...closed].reverse().map(t=>`<tr style="background:${t.profit>=0?'var(--profit-bg)':'var(--loss-bg)'}">
        <td class="td-date">${t.date}</td>
        <td class="td-name">${FULL_NAMES[t.id]||'—'}</td>
        <td>${t.avgPrice}</td>
        <td>${fmt(t.shares)}</td>
        <td>${fmt(t.revenue)}</td>
        <td>${fmt(t.cost)}</td>
        <td>${badge(t.profit,(t.profit>=0?'+':'')+fmt(t.profit))}</td>
        <td style="color:${t.roi>=0?'var(--profit)':'var(--loss)'};font-weight:700">${pct(t.roi)}</td>
      </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
}

// ─── CHART ───────────────────────────────────────────────────────────────────
let chartInst=null, chartMode='cumulative', filterDate='';

function buildChartData(){
  const byDate={};
  closed.forEach(t=>{byDate[t.date]=(byDate[t.date]||0)+t.profit});
  let cum=0;
  let rows = Object.keys(byDate).sort().map(d=>{
    cum+=byDate[d];
    return {fullDate:d, label:d.slice(5), daily:byDate[d], cumulative:cum,
            count:closed.filter(t=>t.date===d).length};
  });
  if(filterDate){
    const norm=s=>s.replace(/[-/]/g,'');
    rows=rows.filter(r=>norm(r.fullDate)>=norm(filterDate));
  }
  return rows;
}

function renderChart(){
  document.getElementById('tab-chart').innerHTML=`
  <div class="chart-controls">
    <div class="ctrl-group">
      <span class="ctrl-label">圖表類型</span>
      <div class="toggle-row">
        <button class="toggle-btn ${chartMode==='cumulative'?'active':''}" onclick="setChartMode('cumulative')">📈 累計走勢</button>
        <button class="toggle-btn ${chartMode==='daily'?'active':''}" onclick="setChartMode('daily')">📊 每日損益</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">篩選起始日期</span>
      <input type="date" class="date-input" id="date-filter" value="${filterDate}"
        onchange="applyDateFilter(this.value)"/>
    </div>
    <div class="ctrl-group" style="justify-content:flex-end">
      <span class="ctrl-label">&nbsp;</span>
      <button class="clear-btn" onclick="applyDateFilter('')">✕ 清除</button>
    </div>
  </div>
  <div id="filter-info" class="filter-info"></div>
  <div class="section">
    <div class="section-head">
      <span class="section-title" id="chart-title">${chartMode==='cumulative'?'累計損益走勢':'每日損益（含數值）'}</span>
    </div>
    <div class="chart-wrap">
      <canvas id="main-chart" height="280"></canvas>
    </div>
  </div>
  <div class="section">
    <div class="section-head"><span class="section-title">各交易日明細</span></div>
    <div class="tbl-wrap">
    <table>
      <thead><tr><th>日期</th><th>當日損益</th><th>累計損益</th><th>筆數</th></tr></thead>
      <tbody id="chart-tbl"></tbody>
    </table>
    </div>
  </div>`;
  drawChart();
}

function drawChart(){
  const data=buildChartData();
  const labels=data.map(d=>d.label);
  const daily=data.map(d=>d.daily);
  const cumul=data.map(d=>d.cumulative);

  // filter info
  const fi=document.getElementById('filter-info');
  if(fi){
    if(filterDate){fi.style.display='block';fi.textContent=`顯示 ${filterDate} 起共 ${data.length} 個交易日`}
    else{fi.style.display='none'}
  }
  // chart title
  const ct=document.getElementById('chart-title');
  if(ct) ct.textContent=chartMode==='cumulative'?'累計損益走勢':'每日損益（含數值）';
  // toggle buttons
  document.querySelectorAll('.toggle-btn').forEach((b,i)=>{
    b.classList.toggle('active',[chartMode==='cumulative',chartMode==='daily'][i]);
  });

  if(chartInst){chartInst.destroy();chartInst=null}
  const ctx=document.getElementById('main-chart');
  if(!ctx) return;

  const gold='rgba(197,163,98,';
  if(chartMode==='cumulative'){
    chartInst=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{
        label:'累計損益',data:cumul,
        borderColor:gold+'1)',backgroundColor:gold+'0.08)',
        pointBackgroundColor:gold+'1)',pointRadius:5,pointHoverRadius:8,
        borderWidth:2.5,fill:true,tension:.35,
      }]},
      options:{
        responsive:true,plugins:{legend:{display:false},
          tooltip:{backgroundColor:'#1d2232',borderColor:gold+'0.4)',borderWidth:1,
            titleColor:'#e8cfa0',bodyColor:'#e8e4dc',padding:10,
            callbacks:{label:c=>`累計損益：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}}},
        scales:{x:{grid:{color:'rgba(197,163,98,0.08)'},ticks:{color:'#7a8299',font:{size:11}}},
                y:{grid:{color:'rgba(197,163,98,0.08)'},ticks:{color:'#7a8299',font:{size:11}}}}}
    });
  } else {
    chartInst=new Chart(ctx,{
      type:'bar',
      data:{labels,datasets:[{
        label:'每日損益',data:daily,
        backgroundColor:daily.map(v=>v>=0?'rgba(74,222,128,0.5)':'rgba(248,113,113,0.5)'),
        borderColor:daily.map(v=>v>=0?'rgba(74,222,128,0.9)':'rgba(248,113,113,0.9)'),
        borderWidth:1.5,borderRadius:5,
      }]},
      options:{
        responsive:true,
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:'#1d2232',borderColor:gold+'0.4)',borderWidth:1,
            titleColor:'#e8cfa0',bodyColor:'#e8e4dc',padding:10,
            callbacks:{label:c=>`當日損益：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}},
          // inline labels via plugin
          datalabels: false,
        },
        scales:{x:{grid:{color:'rgba(197,163,98,0.08)'},ticks:{color:'#7a8299',font:{size:11}}},
                y:{grid:{color:'rgba(197,163,98,0.08)'},ticks:{color:'#7a8299',font:{size:11}}}},
        animation:{onComplete: ()=>{
          const meta=chartInst.getDatasetMeta(0);
          const ctx2=chartInst.ctx;
          ctx2.save();
          ctx2.font='bold 11px DM Sans';
          ctx2.textAlign='center';
          meta.data.forEach((bar,i)=>{
            const v=daily[i];
            ctx2.fillStyle=v>=0?'#4ade80':'#f87171';
            const y=v>=0?bar.y-6:bar.y+bar.height+14;
            ctx2.fillText((v>=0?'+':'')+v.toLocaleString(), bar.x, y);
          });
          ctx2.restore();
        }}
      }
    });
  }

  // table
  const tb=document.getElementById('chart-tbl');
  if(tb) tb.innerHTML=data.map(r=>`<tr style="background:${r.daily>=0?'var(--profit-bg)':'var(--loss-bg)'}">
    <td class="td-date">${r.fullDate}</td>
    <td>${badge(r.daily,(r.daily>=0?'+':'')+fmt(r.daily))}</td>
    <td style="color:${r.cumulative>=0?'var(--profit)':'var(--loss)'};font-weight:700">
      ${r.cumulative>=0?'+':''}${fmt(r.cumulative)}</td>
    <td style="color:var(--muted)">${r.count}</td>
  </tr>`).join('');
}

function setChartMode(m){chartMode=m;drawChart()}
function applyDateFilter(v){filterDate=v;const i=document.getElementById('date-filter');if(i)i.value=v;drawChart()}

// ─── ADD ─────────────────────────────────────────────────────────────────────
let addAction='買';
function renderAdd(){
  document.getElementById('tab-add').innerHTML=`
  <div class="section" style="max-width:500px">
    <div class="section-head"><span class="section-title">新增交易記錄</span></div>
    <div class="form-wrap">
      <div>
        <label class="form-label">交易日期</label>
        <input type="date" class="form-input" id="a-date"/>
      </div>
      <div>
        <label class="form-label">商品全名</label>
        <input class="form-input" id="a-product" placeholder="例：聯發科元大61購11"/>
      </div>
      <div>
        <label class="form-label">交易方向</label>
        <div class="dir-row">
          <button class="dir-btn buy ${addAction==='買'?'active':''}" onclick="setDir('買')">買入</button>
          <button class="dir-btn sell ${addAction==='賣'?'active':''}" onclick="setDir('賣')">賣出</button>
        </div>
      </div>
      <div>
        <label class="form-label">成交價格</label>
        <input type="number" step="0.01" class="form-input" id="a-price" placeholder="0.00" oninput="updatePreview()"/>
      </div>
      <div>
        <label class="form-label">成交股數</label>
        <input type="number" class="form-input" id="a-shares" placeholder="例：5000" oninput="updatePreview()"/>
      </div>
      <div>
        <label class="form-label">備註（選填）</label>
        <input class="form-input" id="a-note"/>
      </div>
      <div class="preview-box" id="a-preview" style="display:none"></div>
      <div style="display:flex;gap:12px;margin-top:4px">
        <button class="submit-btn" onclick="submitTrade()">確認新增</button>
        <button class="cancel-btn" onclick="showTab('overview')">取消</button>
      </div>
    </div>
  </div>`;
}
function setDir(d){addAction=d;renderAdd()}
function updatePreview(){
  const p=parseFloat(document.getElementById('a-price')?.value||0);
  const s=parseInt(document.getElementById('a-shares')?.value||0);
  const box=document.getElementById('a-preview');
  if(!box) return;
  if(p&&s){box.style.display='block';box.innerHTML=`預計成交金額：<strong>${(p*s).toLocaleString()}</strong> 元`}
  else box.style.display='none';
}
function submitTrade(){
  const date=document.getElementById('a-date')?.value;
  const product=document.getElementById('a-product')?.value;
  const price=parseFloat(document.getElementById('a-price')?.value);
  const shares=parseInt(document.getElementById('a-shares')?.value);
  if(!date||!product||!price||!shares){alert('請填寫所有必填欄位');return}
  if(addAction==='賣'){
    closed.push({id:closed.length+1,date:date.replace(/-/g,'/'),avgPrice:price,shares,revenue:price*shares,cost:0,profit:0,roi:0});
  } else {
    open.push({id:open.length+1,product,shares,currentPrice:price,avgCost:price,holdCost:-(price*shares)});
  }
  updateHeader();
  showTab('overview');
}

// ─── Init ────────────────────────────────────────────────────────────────────
updateHeader();
renderOverview();
</script>
