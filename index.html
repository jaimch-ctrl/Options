<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Warrant Ledger · 選擇權投資儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0c0f1a;--bg2:#121626;--bg3:#181d2e;--surface:#1e2438;
  --border:rgba(197,163,98,.18);--border2:rgba(197,163,98,.07);
  --gold:#c5a362;--gold2:#e8cfa0;--gold-dim:rgba(197,163,98,.1);
  --text:#e8e4dc;--muted:#6e7a96;
  --profit:#f0c060;--profit-bg:rgba(240,192,96,.07);--profit-bd:rgba(240,192,96,.22);
  --loss:#f06090;  --loss-bg:rgba(240,96,144,.07);  --loss-bd:rgba(240,96,144,.22);
  --accent:#7eb8e8;
  --r:10px;--shadow:0 6px 32px rgba(0,0,0,.4);
  --fs:15px; /* base font size */
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;font-size:var(--fs);line-height:1.55}

body::before{content:’’;position:fixed;inset:0;pointer-events:none;z-index:0;
background:
radial-gradient(ellipse 70% 45% at 85% 5%,rgba(197,163,98,.07) 0%,transparent 55%),
radial-gradient(ellipse 55% 65% at 5% 85%,rgba(100,130,210,.05) 0%,transparent 55%),
repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(197,163,98,.018) 48px),
repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(197,163,98,.018) 48px);}
#app{position:relative;z-index:1}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#090c18 0%,#111526 60%,#160f24 100%);
border-bottom:1px solid var(–border);padding:0 28px;
display:flex;align-items:center;justify-content:space-between;
height:68px;position:sticky;top:0;z-index:200;
box-shadow:0 2px 40px rgba(0,0,0,.6)}
.logo-row{display:flex;align-items:center;gap:12px}
.logo-mark{width:40px;height:40px;border-radius:10px;
background:linear-gradient(135deg,#d4a843 0%,#7a5220 100%);
display:flex;align-items:center;justify-content:center;
font-size:20px;color:#fff;font-weight:700;
box-shadow:0 0 0 1px rgba(255,255,255,.12),0 3px 14px rgba(197,163,98,.35)}
.logo-text{font-family:‘Cormorant Garamond’,serif;font-size:22px;font-weight:700;color:var(–gold2);letter-spacing:.5px}
.logo-sub{font-size:10px;letter-spacing:2.5px;color:var(–muted);text-transform:uppercase;margin-top:1px}
.hdr-nums{display:flex;gap:24px}
.hnum{text-align:right}
.hnum-lbl{font-size:10px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.hnum-val{font-family:‘Cormorant Garamond’,serif;font-size:21px;font-weight:700}

/* ── NAV ── */
nav{background:var(–bg2);border-bottom:1px solid var(–border);
padding:0 28px;display:flex;gap:0;overflow-x:auto}
.nb{background:transparent;border:none;border-bottom:2px solid transparent;
color:var(–muted);padding:16px 20px;cursor:pointer;
font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:500;
white-space:nowrap;transition:all .18s}
.nb:hover{color:var(–gold2)}
.nb.active{color:var(–gold);border-bottom-color:var(–gold);font-weight:600}

/* ── BODY ── */
.body{padding:26px 28px}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:22px}
.scard{background:var(–bg2);border:1px solid var(–border);border-radius:var(–r);
padding:20px 22px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.scard:hover{transform:translateY(-2px);box-shadow:var(–shadow)}
.scard::after{content:’’;position:absolute;top:-20px;right:-20px;width:90px;height:90px;
border-radius:50%;pointer-events:none;
background:radial-gradient(circle,rgba(197,163,98,.1),transparent 70%)}
.sc-lbl{font-size:10px;letter-spacing:2.5px;color:var(–muted);text-transform:uppercase;margin-bottom:9px}
.sc-val{font-family:‘Cormorant Garamond’,serif;font-size:32px;font-weight:700;line-height:1}
.sc-sub{font-size:12px;color:var(–muted);margin-top:8px}
.sc-bar{height:2px;background:rgba(197,163,98,.12);border-radius:2px;margin-top:14px;overflow:hidden}
.sc-bar-fill{height:100%;background:linear-gradient(90deg,var(–gold),var(–gold2));border-radius:2px;transition:width .7s ease}
.cp{color:var(–profit)}.cl{color:var(–loss)}.cg{color:var(–gold)}

/* ── SECTION ── */
.sec{background:var(–bg2);border:1px solid var(–border);border-radius:var(–r);
overflow:hidden;margin-bottom:18px;box-shadow:0 3px 20px rgba(0,0,0,.3)}
.sec-hd{padding:15px 22px;border-bottom:1px solid var(–border2);
display:flex;align-items:center;justify-content:space-between;
background:linear-gradient(90deg,var(–bg3),var(–bg2))}
.sec-title{font-family:‘Cormorant Garamond’,serif;font-size:17px;font-weight:600;color:var(–gold2);letter-spacing:.3px}
.sec-sub{font-size:12px;color:var(–muted)}
.sec-btn{font-size:12px;color:var(–gold);cursor:pointer;border:1px solid var(–border);
background:var(–gold-dim);padding:5px 13px;border-radius:6px;transition:all .15s;font-family:‘DM Sans’,sans-serif}
.sec-btn:hover{background:rgba(197,163,98,.18)}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14.5px}
thead th{background:var(–bg3);color:var(–muted);font-size:10.5px;letter-spacing:1.8px;
text-transform:uppercase;padding:12px 15px;text-align:left;
border-bottom:1px solid var(–border);white-space:nowrap;font-weight:500}
tbody tr{transition:background .12s}
tbody tr:hover{background:rgba(197,163,98,.04)}
td{padding:12px 15px;border-bottom:1px solid var(–border2);vertical-align:middle;font-size:14.5px}
.td-name{font-weight:600;color:var(–gold2);white-space:nowrap}
.td-date{color:var(–muted);font-size:13px;white-space:nowrap}
.td-sub{font-size:12px;color:var(–muted);display:block;margin-top:2px}

/* ── BADGES ── */
.bdg{display:inline-block;padding:4px 11px;border-radius:5px;font-size:13px;font-weight:700}
.bdg-p{background:var(–profit-bg);color:var(–profit);border:1px solid var(–profit-bd)}
.bdg-l{background:var(–loss-bg);color:var(–loss);border:1px solid var(–loss-bd)}

/* ── OPEN TABLE — display mode + edit mode ── */
/* Cells show as plain text; clicking “編輯” row switches to inputs */
.edit-inp{
background:rgba(197,163,98,.07);border:1px solid rgba(197,163,98,.25);
color:var(–text);padding:5px 10px;border-radius:6px;
font-family:‘DM Sans’,sans-serif;font-size:14px;
outline:none;transition:border-color .18s;width:100%;min-width:70px}
.edit-inp:focus{border-color:var(–gold);box-shadow:0 0 0 2px rgba(197,163,98,.13)}
.edit-inp.wide{min-width:160px}
.row-action-btn{
padding:4px 11px;border-radius:6px;cursor:pointer;font-size:12px;
font-family:‘DM Sans’,sans-serif;border:1px solid;transition:all .15s;white-space:nowrap}
.btn-edit{background:var(–gold-dim);border-color:rgba(197,163,98,.3);color:var(–gold)}
.btn-edit:hover{background:rgba(197,163,98,.2)}
.btn-save{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.3);color:#4ade80}
.btn-save:hover{background:rgba(74,222,128,.16)}
.btn-del{background:rgba(240,96,144,.07);border-color:rgba(240,96,144,.25);color:var(–loss)}
.btn-del:hover{background:rgba(240,96,144,.16)}

@keyframes flash{0%,100%{opacity:1}50%{opacity:.5}}
.flash{animation:flash .4s ease}

/* ── CHART ── */
.chart-ctrl{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.cg-wrap{display:flex;flex-direction:column;gap:5px}
.cg-lbl{font-size:10px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.tog-row{display:flex;gap:6px}
.tog{background:var(–bg3);border:1px solid var(–border);color:var(–muted);
padding:9px 17px;border-radius:7px;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:14px;transition:all .18s}
.tog.active{background:var(–gold-dim);border-color:var(–gold);color:var(–gold);font-weight:600}
.date-inp{background:var(–bg3);border:1px solid var(–border);color:var(–text);
padding:9px 12px;border-radius:7px;font-family:‘DM Sans’,sans-serif;font-size:14px;
outline:none;width:150px}
.date-inp:focus{border-color:var(–gold)}
.clr-btn{background:transparent;border:1px solid var(–border);color:var(–muted);
padding:9px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-family:‘DM Sans’,sans-serif}
.filter-banner{background:rgba(197,163,98,.06);border:1px solid rgba(197,163,98,.25);
border-radius:8px;padding:9px 16px;font-size:13px;color:var(–gold);
margin-bottom:14px;display:none}
.cw{padding:24px;background:var(–bg2)}

/* Chart trade detail sub-table */
.trade-detail{background:var(–bg3);border-left:3px solid var(–border);
padding:8px 12px;margin-top:6px;border-radius:0 6px 6px 0;font-size:13px}
.trade-detail table{font-size:13px}
.trade-detail thead th{font-size:9.5px;padding:6px 10px;background:transparent;border-bottom:1px solid var(–border2)}
.trade-detail td{padding:6px 10px;border-bottom:1px solid var(–border2)}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;
align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(–bg2);border:1px solid var(–border);border-radius:14px;
padding:30px;width:min(560px,95vw);box-shadow:0 16px 60px rgba(0,0,0,.6);
max-height:90vh;overflow-y:auto}
.modal-title{font-family:‘Cormorant Garamond’,serif;font-size:21px;color:var(–gold2);
margin-bottom:24px;font-weight:600}
.f-grid{display:flex;flex-direction:column;gap:16px}
.f-row{display:flex;gap:14px;flex-wrap:wrap}
.f-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:110px}
.f-group.full{flex:100%}
.f-lbl{font-size:10px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.f-inp{background:var(–bg3);border:1px solid var(–border);color:var(–text);
padding:10px 14px;border-radius:8px;font-family:‘DM Sans’,sans-serif;
font-size:15px;outline:none;width:100%;transition:border-color .18s}
.f-inp:focus{border-color:var(–gold);box-shadow:0 0 0 2px rgba(197,163,98,.12)}
.f-hint{font-size:11px;color:var(–muted);margin-top:2px}
.prev-box{background:rgba(197,163,98,.06);border:1px solid rgba(197,163,98,.2);
border-radius:8px;padding:12px 16px;font-size:14px;color:var(–gold);display:none;line-height:1.8}
.modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.ok-btn{background:linear-gradient(135deg,var(–gold) 0%,#8a6020 100%);color:#0c0f1a;
border:none;padding:12px 30px;border-radius:8px;font-family:‘DM Sans’,sans-serif;
font-size:15px;font-weight:700;cursor:pointer}
.ok-btn:hover{opacity:.88}
.no-btn{background:var(–bg3);border:1px solid var(–border);color:var(–muted);
padding:12px 22px;border-radius:8px;cursor:pointer;font-size:15px;font-family:‘DM Sans’,sans-serif}

/* misc */
.gold-line{height:1px;background:linear-gradient(90deg,transparent,rgba(197,163,98,.4),transparent);margin:4px 0 20px}
.tip{font-size:12px;color:var(–muted);padding:10px 22px;border-top:1px solid var(–border2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(–bg)}
::-webkit-scrollbar-thumb{background:rgba(197,163,98,.25);border-radius:3px}
</style>

</head>
<body>
<div id="app">

<header>
  <div class="logo-row">
    <div class="logo-mark">◈</div>
    <div>
      <div class="logo-text">Warrant Ledger</div>
      <div class="logo-sub">選擇權投資儀表板</div>
    </div>
  </div>
  <div class="hdr-nums" id="hdr"></div>
</header>

<nav>
  <button class="nb active" onclick="go('overview')">總覽</button>
  <button class="nb" onclick="go('open')">持倉明細</button>
  <button class="nb" onclick="go('closed')">已實現損益</button>
  <button class="nb" onclick="go('chart')">圖表分析</button>
</nav>

<div class="body">
  <div id="pv-overview"></div>
  <div id="pv-open"   style="display:none"></div>
  <div id="pv-closed" style="display:none"></div>
  <div id="pv-chart"  style="display:none"></div>
</div>

<!-- Modal -->

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="f-grid" id="modal-body"></div>
    <div class="modal-actions">
      <button class="ok-btn" id="modal-ok">確認新增</button>
      <button class="no-btn" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════ DATA ════════════════════════════════
let openPos = [
  {id:1, product:"鴻海統一68購03",   shares:10000,price:0.36,cost:0.37},
  {id:2, product:"強茂統一5C購01",   shares:6000, price:0.51,cost:0.77},
  {id:3, product:"強茂統一71購01",   shares:2000, price:0.73,cost:0.9},
  {id:4, product:"惠特統一61購01",   shares:5000, price:0.49,cost:0.85},
  {id:5, product:"力成元大57購12",   shares:5000, price:0.49,cost:0.62},
  {id:6, product:"強茂永豐57購03",   shares:13000,price:0.41,cost:0.76},
  {id:7, product:"聯發科元大5A購05", shares:5000, price:1.57,cost:0.31},
  {id:8, product:"台積電元大58購01", shares:12000,price:1.26,cost:0.61},
  {id:9, product:"聯發科元大61購11", shares:13000,price:1.39,cost:0.83},
  {id:10,product:"聯發科元大61購16", shares:12000,price:1.63,cost:0.79},
  {id:11,product:"聯發科中信63購01", shares:8000, price:1.02,cost:0.82},
  {id:12,product:"聯發科元大61購18", shares:5000, price:1.41,cost:0.73},
  {id:13,product:"臺指2X中信63購03", shares:6000, price:0.7, cost:0.55},
  {id:14,product:"聯發科統一62購01", shares:12000,price:1.19,cost:0.65},
  {id:15,product:"公勝保經",         shares:1000, price:79,  cost:88.9},
];

// closedTrades: profit & roi are stored (can be entered or auto-calculated)
let closedTrades = [
  {id:1, date:"2026/04/08",name:"勤誠兆豐59購01",  buyP:0.53,sellP:0.71,shares:4000, profit:718,  roi:34.19},
  {id:2, date:"2026/04/09",name:"啟碁元大5C購01",  buyP:0.62,sellP:1.08,shares:8000, profit:3672, roi:74.33},
  {id:3, date:"2026/04/10",name:"聯發科元大61購18", buyP:0.52,sellP:0.45,shares:5000, profit:-342, roi:-13.31},
  {id:4, date:"2026/04/10",name:"啟碁富邦5C購01",  buyP:0.41,sellP:0.87,shares:2000, profit:889,  roi:107.11},
  {id:5, date:"2026/04/10",name:"力成元大57購05",   buyP:0.60,sellP:0.68,shares:4000, profit:318,  roi:13.36},
  {id:6, date:"2026/04/13",name:"啟碁元大61購06",   buyP:0.60,sellP:1.3, shares:3000, profit:2092, roi:117.20},
  {id:7, date:"2026/04/13",name:"啟碁元大61購04",   buyP:0.72,sellP:1.55,shares:3000, profit:2476, roi:115.16},
  {id:8, date:"2026/04/13",name:"啟碁元大61購03",   buyP:0.53,sellP:1.2, shares:3000, profit:1997, roi:126.39},
  {id:9, date:"2026/04/13",name:"強茂永豐57購03",   buyP:0.32,sellP:0.47,shares:10000,profit:1456, roi:45.22},
  {id:10,date:"2026/04/13",name:"強茂元大55購02",   buyP:0.55,sellP:0.94,shares:3000, profit:1158, roi:70.61},
  {id:11,date:"2026/04/15",name:"啟碁富邦5C購01",   buyP:0.41,sellP:1.04,shares:2000, profit:1228, roi:147.95},
  {id:12,date:"2026/04/15",name:"啟碁元大61購06",   buyP:0.59,sellP:1.2, shares:5000, profit:2999, roi:100.81},
  {id:13,date:"2026/04/16",name:"聯發科元大61購16", buyP:0.41,sellP:0.68,shares:13000,profit:3502, roi:65.95},
  {id:14,date:"2026/04/16",name:"聯發科元大61購15", buyP:0.53,sellP:1.01,shares:5000, profit:2355, roi:88.20},
  {id:15,date:"2026/04/16",name:"聯發科元大5A購05", buyP:0.31,sellP:0.63,shares:4000, profit:1249, roi:100.00},
  {id:16,date:"2026/04/17",name:"聯發科元大61購18", buyP:0.40,sellP:0.73,shares:5000, profit:1617, roi:80.45},
  {id:17,date:"2026/04/17",name:"聯發科元大61購16", buyP:0.35,sellP:0.7, shares:4000, profit:1366, roi:96.74},
  {id:18,date:"2026/04/17",name:"聯發科元大61購13", buyP:0.45,sellP:0.89,shares:7000, profit:3045, roi:96.06},
  {id:19,date:"2026/04/17",name:"國巨統一6B購03",   buyP:0.91,sellP:0.97,shares:6000, profit:315,  roi:5.75},
  {id:20,date:"2026/04/21",name:"順達統一61購01",   buyP:0.82,sellP:0.81,shares:7000, profit:-65,  roi:-1.14},
  {id:21,date:"2026/04/21",name:"台虹統一6C購01",   buyP:0.84,sellP:0.91,shares:6000, profit:435,  roi:8.70},
  {id:22,date:"2026/04/21",name:"富喬統一62購02",   buyP:0.91,sellP:0.96,shares:4000, profit:197,  roi:5.44},
  {id:23,date:"2026/04/22",name:"精材元大61購04",   buyP:0.52,sellP:0.64,shares:6000, profit:677,  roi:21.56},
  {id:24,date:"2026/04/22",name:"富喬統一61購04",   buyP:0.76,sellP:0.73,shares:4000, profit:-122, roi:-4.04},
  {id:25,date:"2026/04/22",name:"強茂永豐57購03",   buyP:0.92,sellP:0.52,shares:7000, profit:-2837,roi:-43.96},
  {id:26,date:"2026/04/22",name:"惠特統一61購03",   buyP:0.58,sellP:0.49,shares:5000, profit:-442, roi:-15.40},
];

let nextOpenId=20, nextCloseId=30;

// ═══════════════════ COMPUTED ════════════════════════════
const holdCost = p => +(p.cost * p.shares).toFixed(0);
const mv       = p => +(p.price * p.shares).toFixed(0);
const ep       = p => mv(p) - holdCost(p);
const eroi     = p => holdCost(p) ? +((ep(p)/holdCost(p))*100).toFixed(2) : 0;
const be       = p => p.cost.toFixed(3);  // break-even = cost price (already paid that per share)

const totalClosed  = ()=> closedTrades.reduce((s,t)=>s+t.profit,0);
const totalOpenEst = ()=> openPos.filter(p=>p.product!=='公勝保經').reduce((s,p)=>s+ep(p),0);
const wins     = ()=> closedTrades.filter(t=>t.profit>0).length;
const winRate  = ()=> closedTrades.length?(wins()/closedTrades.length*100).toFixed(1):'0.0';
const avgRoi   = ()=> closedTrades.length?(closedTrades.reduce((s,t)=>s+t.roi,0)/closedTrades.length).toFixed(1):'0.0';
const bestTrade= ()=> [...closedTrades].sort((a,b)=>b.profit-a.profit)[0];

const fmt  = (n,d=0)=>(+n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct  = n=>`${n>=0?'+':''}${(+n).toFixed(2)}%`;
const pc   = n=>n>=0?'cp':'cl';
const bdg  = (n,txt)=>`<span class="bdg ${n>=0?'bdg-p':'bdg-l'}">${txt}</span>`;

// ═══════════════════ HEADER ══════════════════════════════
function updateHeader(){
  const tc=totalClosed(), to=totalOpenEst();
  document.getElementById('hdr').innerHTML=`
    <div class="hnum">

function calcClosedProfit(buyP,sellP,shares){return +((sellP-buyP)*shares).toFixed(0)}
function calcClosedRoi(buyP,sellP){return buyP?+(((sellP-buyP)/buyP)*100).toFixed(2):0}

function previewClosed(id){
  const bp=+document.getElementById('cbp-'+id)?.value||0;
  const sp=+document.getElementById('csp-'+id)?.value||0;
  const sh=+document.getElementById('csh-'+id)?.value||0;
  if(!bp||!sp||!sh) return;
  const pr=calcClosedProfit(bp,sp,sh), ri=calcClosedRoi(bp,sp);
  const pEl=document.getElementById('cpr-'+id), rEl=document.getElementById('cri-'+id);
  if(pEl) pEl.innerHTML=bdg(pr,(pr>=0?'+':'')+fmt(pr));
  if(rEl){rEl.textContent=pct(ri);rEl.className=pc(ri);rEl.style.fontWeight='700'}
}

function startEditClosed(id){editingClosed.add(id);renderClosedRows()}

function saveClosed(id){
  const t=closedTrades.find(x=>x.id===id); if(!t) return;
  t.date  =document.getElementById('cd-'+id)?.value||t.date;
  t.name  =document.getElementById('cn-'+id)?.value.trim()||t.name;
  t.buyP  =+document.getElementById('cbp-'+id)?.value||t.buyP;
  t.sellP =+document.getElementById('csp-'+id)?.value||t.sellP;
  t.shares=+document.getElementById('csh-'+id)?.value||t.shares;
  t.profit=calcClosedProfit(t.buyP,t.sellP,t.shares);
  t.roi   =calcClosedRoi(t.buyP,t.sellP);
  editingClosed.delete(id);
  renderClosedRows(); updateHeader();
  if(document.getElementById('pv-overview').style.display!=='none') renderOverview();
}

function delClosed(id){
  if(!confirm('確定刪除？')) return;

  editingClosed.delete(id);

}

let chartInst=null, chartMode='cumulative', dateFrom='', dateTo='';

function buildChartData(){
  const byDate={};
  closedTrades.forEach(t=>{
    if(!byDate[t.date]) byDate[t.date]={daily:0,trades:[]};
    byDate[t.date].daily+=t.profit;
    byDate[t.date].trades.push(t);
  });
  const norm=s=>s.replace(/[-/]/g,'');
  let cum=0;
  let rows=Object.keys(byDate).sort().map(d=>{
    cum+=byDate[d].daily;
    return{fullDate:d,label:d.slice(5),daily:byDate[d].daily,cumulative:cum,trades:byDate[d].trades};
  });
  if(dateFrom) rows=rows.filter(r=>norm(r.fullDate)>=norm(dateFrom));
  if(dateTo)   rows=rows.filter(r=>norm(r.fullDate)<=norm(dateTo));
  let c=0; return rows.map(r=>{c+=r.daily;return{...r,cumulative:c}});
}

    <div class="cw"><canvas id="mc" height="260"></canvas></div>
  </div>
  <!-- Per-date detail with trade breakdown -->
  <div class="sec">
    <div class="sec-hd"><span class="sec-title">各交易日明細（含買賣明細）</span></div>
    <div class="tw" id="chart-detail"></div>
  </div>`;
  drawChart();
}

function drawChart(){
  const data=buildChartData();
  const fb=document.getElementById('fb');
  if(fb){
    if(dateFrom||dateTo){
      fb.style.display='block';
      fb.textContent=`篩選範圍：${dateFrom||'最早'} ～ ${dateTo||'最新'}　共 ${data.length} 個交易日`;
    } else fb.style.display='none';
  }
  const tEl=document.getElementById('ct-title');
  if(tEl) tEl.textContent=chartMode==='cumulative'?'累計損益走勢':'每日損益';
  const rangeSum=data.reduce((s,r)=>s+r.daily,0);
  const sEl=document.getElementById('ct-sub');
  if(sEl&&data.length) sEl.innerHTML=`範圍合計：<span style="color:${rangeSum>=0?'var(--profit)':'var(--loss)'};font-weight:700">${rangeSum>=0?'+':''}${fmt(rangeSum)}</span>`;
  document.querySelectorAll('.tog').forEach((b,i)=>b.classList.toggle('active',[chartMode==='cumulative',chartMode==='daily'][i]));

  if(chartInst){chartInst.destroy();chartInst=null}
  const ctx=document.getElementById('mc'); if(!ctx) return;
  const labels=data.map(d=>d.label);
  const daily=data.map(d=>d.daily);
  const cumul=data.map(d=>d.cumulative);
  const G='rgba(197,163,98,';

  if(chartMode==='cumulative'){
    chartInst=new Chart(ctx,{type:'line',data:{labels,datasets:[{
      label:'累計損益',data:cumul,
      borderColor:G+'1)',backgroundColor:G+'0.07)',
      pointBackgroundColor:G+'1)',pointRadius:5,pointHoverRadius:8,
      borderWidth:2.5,fill:true,tension:.35}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#1d2238',borderColor:G+'0.4)',borderWidth:1,
          titleColor:'#e8cfa0',bodyColor:'#e8e4dc',padding:10,
          callbacks:{label:c=>`累計：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}}},
        scales:{x:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:12}}},
                y:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:12}}}}}});
  } else {
    chartInst=new Chart(ctx,{type:'bar',data:{labels,datasets:[{
      label:'每日損益',data:daily,
      backgroundColor:daily.map(v=>v>=0?'rgba(240,192,96,.45)':'rgba(240,96,144,.45)'),
      borderColor:daily.map(v=>v>=0?'rgba(240,192,96,.9)':'rgba(240,96,144,.9)'),
      borderWidth:1.5,borderRadius:5}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#1d2238',borderColor:G+'0.4)',borderWidth:1,
          titleColor:'#e8cfa0',bodyColor:'#e8e4dc',padding:10,
          callbacks:{label:c=>`當日：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}}},
        scales:{x:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:12}}},
                y:{grid:{color:G+'0.07)'},ticks:{color:'#6e7a96',font:{size:12}}}},
        animation:{onComplete:()=>{
          if(!chartInst) return;
          const meta=chartInst.getDatasetMeta(0), c2=chartInst.ctx;
          c2.save();c2.font='bold 11.5px DM Sans';c2.textAlign='center';
          meta.data.forEach((bar,i)=>{
            const v=daily[i];
            c2.fillStyle=v>=0?'#f0c060':'#f06090';
            c2.fillText((v>=0?'+':'')+v.toLocaleString(),bar.x,v>=0?bar.y-6:bar.y+bar.height+15);
          });
          c2.restore();
        }}
      }});
  }

  // Per-date detail table with trade breakdown
  const det=document.getElementById('chart-detail'); if(!det) return;
  det.innerHTML=`<table>
    <thead><tr>
      <th>日期</th><th>當日損益</th><th>累計損益</th><th>筆數</th>
    </tr></thead>
    <tbody>
    ${data.map(r=>`
      <tr style="background:${r.daily>=0?'var(--profit-bg)':'var(--loss-bg)'}">
        <td class="td-date" style="font-weight:600">${r.fullDate}</td>
        <td>${bdg(r.daily,(r.daily>=0?'+':'')+fmt(r.daily))}</td>
        <td class="${pc(r.cumulative)}" style="font-weight:700">${r.cumulative>=0?'+':''}${fmt(r.cumulative)}</td>
        <td style="color:var(--muted)">${r.count}</td>
      </tr>
      <tr style="background:${r.daily>=0?'rgba(240,192,96,.03)':'rgba(240,96,144,.03)'}">
        <td colspan="4" style="padding:4px 15px 14px 28px">
          <div class="trade-detail">
            <table style="width:100%">
              <thead><tr>
                <th>商品</th><th>買進均價</th><th>賣出均價</th><th>股數</th><th>損益</th><th>獲利率</th>
              </tr></thead>
              <tbody>
              ${r.trades.map(t=>`<tr>
                <td class="td-name" style="font-size:13px">${t.name}</td>
                <td style="font-size:13px;color:var(--muted)">${t.buyP}</td>
                <td style="font-size:13px;color:var(--muted)">${t.sellP}</td>
                <td style="font-size:13px;color:var(--muted)">${fmt(t.shares)}</td>
                <td>${bdg(t.profit,(t.profit>=0?'+':'')+fmt(t.profit))}</td>
                <td class="${pc(t.roi)}" style="font-weight:700;font-size:13px">${pct(t.roi)}</td>
              </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </td>
      </tr>
    `).join('')}
    </tbody>
  </table>`;
}

function setMode(m){chartMode=m;drawChart()}
function setDF(v){dateFrom=v;drawChart()}
function setDT(v){dateTo=v;drawChart()}
function clearDates(){
  dateFrom='';dateTo='';
  const a=document.getElementById('df'),b=document.getElementById('dt');
  if(a)a.value='';if(b)b.value='';
  drawChart();
}

// ═══════════════════ INIT ════════════════════════════════
updateHeader();
renderOverview();
</script>

</body>
</html>
