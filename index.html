:root{

  --bg2:      #131726;
  --bg3:      #191e30;
  --border:   rgba(200,169,110,.16);

–gold2:    #e2c99a;
–gold-dim: rgba(200,169,110,.10);

–profit:     #22c55e;
–profit-bg:  rgba(34,197,94,.07);

–loss:       #f43f5e;
–loss-bg:    rgba(244,63,94,.07);

/* Kill any GitHub Pages wrapper divs */

.main-content,

background:linear-gradient(135deg,#080b16 0%,#0f1322 60%,#130e20 100%) !important;
border-bottom:1px solid rgba(200,169,110,.16) !important;
padding:0 28px !important;
display:flex !important;align-items:center !important;justify-content:space-between !important;
height:68px !important;position:sticky !important;top:0 !important;z-index:200 !important;
box-shadow:0 2px 40px rgba(0,0,0,.65) !important;
color:#e6e1d8 !important;
}
.logo-row{display:flex;align-items:center;gap:13px}
.logo-mark{
width:40px;height:40px;border-radius:10px;
background:linear-gradient(135deg,#d4a843 0%,#7a5020 100%);
display:flex;align-items:center;justify-content:center;
font-size:20px;color:#fff;font-weight:700;
box-shadow:0 0 0 1px rgba(255,255,255,.10),0 3px 14px rgba(200,169,110,.3);
}
.logo-text{font-family:var(–font-serif);font-size:22px;font-weight:700;color:#e2c99a !important;letter-spacing:.5px}
.logo-sub{font-size:10px;letter-spacing:2.5px;color:#6b7691 !important;text-transform:uppercase;margin-top:1px}
.hdr-nums{display:flex;gap:24px}
.hnum{text-align:right}
.hnum-lbl{font-size:10px;letter-spacing:2px;color:#6b7691 !important;text-transform:uppercase}
.hnum-val{font-family:var(–font-num);font-size:21px;font-weight:800;letter-spacing:-0.3px}

/* ── NAV ── gold tabs, no blue ── */
nav{
background:#131726 !important;
border-bottom:1px solid rgba(200,169,110,.16) !important;
padding:0 28px !important;
display:flex !important;gap:0 !important;overflow-x:auto !important;
}
.nb{
background:transparent !important;border:none !important;
border-bottom:2px solid transparent !important;
color:#6b7691 !important;
padding:16px 20px !important;cursor:pointer !important;
font-family:var(–font-sans) !important;font-size:14px !important;font-weight:600 !important;
white-space:nowrap !important;transition:color .18s,border-color .18s !important;
text-decoration:none !important;box-shadow:none !important;
}
.nb:hover{color:#e2c99a !important;text-decoration:none !important}
.nb.active{
color:#c8a96e !important;
border-bottom-color:#c8a96e !important;
font-weight:700 !important;
background:transparent !important;
}
.nb-export{
margin-left:auto !important;background:transparent !important;
border:none !important;border-left:1px solid rgba(200,169,110,.16) !important;
color:#6b7691 !important;padding:14px 18px !important;cursor:pointer !important;
font-family:var(–font-sans) !important;font-size:12px !important;font-weight:600 !important;
white-space:nowrap !important;transition:color .18s !important;letter-spacing:.5px !important;
align-self:center !important;text-decoration:none !important;
}

/* ── BODY ── */
.body{padding:26px 28px !important;background:#0c0f1a !important}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:22px}
.scard{
background:#131726 !important;border:1px solid rgba(200,169,110,.16);
border-radius:var(–r);padding:20px 22px;
position:relative;overflow:hidden;
transition:transform .2s,box-shadow .2s;
}
.scard:hover{transform:translateY(-2px);box-shadow:var(–shadow)}
.scard::after{
content:’’;position:absolute;top:-22px;right:-22px;
width:90px;height:90px;border-radius:50%;pointer-events:none;
background:radial-gradient(circle,rgba(200,169,110,.09),transparent 70%);
}
.sc-lbl{font-size:10px;letter-spacing:2.5px;color:#6b7691 !important;text-transform:uppercase;margin-bottom:9px;font-weight:600}
.sc-val{color:#e6e1d8 !important;font-family:var(–font-num);font-size:34px;font-weight:800;line-height:1;letter-spacing:-0.5px}
.sc-sub{font-size:12px;color:#6b7691 !important;margin-top:8px;font-weight:500}
.sc-bar{height:2px;background:rgba(200,169,110,.12);border-radius:2px;margin-top:14px;overflow:hidden}
.sc-bar-fill{height:100%;background:linear-gradient(90deg,#c8a96e,#e2c99a);border-radius:2px;transition:width .7s ease}

/* colour helpers — !important to override GitHub Pages */
.cp{color:#22c55e !important}
.cl{color:#f43f5e !important}
.cg{color:#c8a96e !important}
.cm{color:#6b7691 !important}

/* ── SECTION ── */
.sec{
background:#131726 !important;border:1px solid rgba(200,169,110,.16) !important;
border-radius:var(–r) !important;overflow:hidden !important;
margin-bottom:18px !important;box-shadow:0 3px 20px rgba(0,0,0,.28) !important;
}
.sec-hd{
padding:15px 22px !important;border-bottom:1px solid rgba(200,169,110,.07) !important;
display:flex !important;align-items:center !important;justify-content:space-between !important;
background:linear-gradient(90deg,#191e30,#131726) !important;
}
.sec-title{font-family:var(–font-serif) !important;font-size:17px !important;font-weight:700 !important;color:#e2c99a !important;letter-spacing:.3px !important}
.sec-sub{font-size:12px !important;color:#6b7691 !important}

/* ── TABLE ── */
.tw{overflow-x:auto !important}
table{width:100% !important;border-collapse:collapse !important;font-size:14.5px !important}
thead th{
background:#191e30 !important;color:#6b7691 !important;
font-size:10.5px !important;letter-spacing:1.8px !important;text-transform:uppercase !important;
padding:12px 15px !important;text-align:left !important;
border-bottom:1px solid rgba(200,169,110,.16) !important;white-space:nowrap !important;font-weight:500 !important;
}
tbody tr{transition:background .12s}
tbody tr:hover{background:rgba(200,169,110,.04) !important}
td{padding:12px 15px !important;border-bottom:1px solid rgba(200,169,110,.07) !important;vertical-align:middle !important;font-size:14.5px !important;color:#e6e1d8 !important}
.td-name{font-weight:600 !important;color:#e2c99a !important;white-space:nowrap !important}
.td-date{color:#6b7691 !important;font-size:13px !important;white-space:nowrap !important}

/* ── BADGES ── */
.bdg{display:inline-block !important;padding:4px 11px !important;border-radius:5px !important;font-size:13px !important;font-weight:700 !important}
.bdg-p{background:rgba(34,197,94,.07) !important;color:#22c55e !important;border:1px solid rgba(34,197,94,.22) !important}
.bdg-l{background:rgba(244,63,94,.07) !important;color:#f43f5e !important;border:1px solid rgba(244,63,94,.22) !important}

/* ── EDIT INPUTS ── */
.edit-inp{
background:rgba(200,169,110,.07) !important;border:1px solid rgba(200,169,110,.22) !important;
color:#e6e1d8 !important;padding:5px 10px !important;border-radius:6px !important;
font-family:var(–font-sans) !important;font-size:14px !important;
outline:none !important;transition:border-color .18s !important;width:100% !important;min-width:70px !important;
}
.edit-inp:focus{border-color:#c8a96e !important;box-shadow:0 0 0 2px rgba(200,169,110,.13) !important}
.edit-inp.wide{min-width:160px}

/* ── ROW BUTTONS ── */
.rab{padding:4px 11px !important;border-radius:6px !important;cursor:pointer !important;
font-size:12px !important;font-family:var(–font-sans) !important;
border:1px solid !important;transition:all .15s !important;white-space:nowrap !important;
text-decoration:none !important;outline:none !important;}
.btn-edit{background:rgba(200,169,110,.10) !important;border-color:rgba(200,169,110,.28) !important;color:#c8a96e !important;}
.btn-edit:hover{background:rgba(200,169,110,.2) !important;color:#e2c99a !important;}
.btn-save{background:rgba(34,197,94,.08) !important;border-color:rgba(34,197,94,.3) !important;color:#22c55e !important;}
.btn-save:hover{background:rgba(34,197,94,.16) !important;}
.btn-del{background:rgba(244,63,94,.07) !important;border-color:rgba(244,63,94,.24) !important;color:#f43f5e !important;}
.btn-del:hover{background:rgba(244,63,94,.16) !important;}

@keyframes flash{0%,100%{opacity:1}50%{opacity:.45}}
.flash{animation:flash .4s ease}

/* ── DRAG & DROP ── */
.drag-handle{
display:inline-flex;align-items:center;justify-content:center;
width:22px;height:32px;cursor:grab;color:#6b7691 !important;
font-size:16px;opacity:.5;transition:opacity .15s;
touch-action:none; /* essential for iOS touch drag */
user-select:none;-webkit-user-select:none;
}
.drag-handle:hover{opacity:1;color:#c8a96e !important}
.drag-handle:active{cursor:grabbing}
tr.dragging{
opacity:.4;
background:rgba(200,169,110,.12) !important;
}
tr.drag-over{
border-top:2px solid #c8a96e !important;
background:rgba(200,169,110,.08) !important;
}

/* ── CHART CONTROLS ── */
.chart-ctrl{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.cg-wrap{display:flex;flex-direction:column;gap:5px}
.cg-lbl{font-size:10px;letter-spacing:2px;color:#6b7691 !important;text-transform:uppercase}
.tog-row{display:flex;gap:6px}
.tog{
background:#191e30 !important;border:1px solid rgba(200,169,110,.16) !important;color:#6b7691 !important;
padding:9px 17px !important;border-radius:7px !important;cursor:pointer !important;
font-family:var(–font-sans) !important;font-size:14px !important;transition:all .18s !important;
outline:none !important;text-decoration:none !important;
}
.tog.active{background:rgba(200,169,110,.10) !important;border-color:#c8a96e !important;color:#c8a96e !important;font-weight:600 !important;}
.tog:hover:not(.active){color:#e2c99a !important;}
.date-inp{
background:#191e30 !important;border:1px solid rgba(200,169,110,.16) !important;color:#e6e1d8 !important;
padding:9px 12px !important;border-radius:7px !important;font-family:var(–font-sans) !important;
font-size:14px !important;outline:none !important;width:150px !important;
}
.date-inp:focus{border-color:#c8a96e !important;}
.clr-btn{
background:transparent !important;border:1px solid rgba(200,169,110,.16) !important;color:#6b7691 !important;
padding:9px 14px !important;border-radius:7px !important;cursor:pointer !important;
font-size:13px !important;font-family:var(–font-sans) !important;
outline:none !important;text-decoration:none !important;
}
.clr-btn:hover{border-color:#c8a96e !important;color:#c8a96e !important;}
.filter-banner{
background:rgba(200,169,110,.06);border:1px solid var(–gold-bd);
border-radius:8px;padding:9px 16px;font-size:13px;color:#c8a96e !important;
margin-bottom:14px;display:none;
}
.cw{padding:24px;background:#131726 !important}

/* trade detail sub-table */
.trade-detail{
background:#191e30 !important;border-left:3px solid var(–border);
padding:8px 12px;margin-top:4px;border-radius:0 6px 6px 0;
}
.trade-detail table{font-size:13px}
.trade-detail thead th{
font-size:9.5px;padding:6px 10px;
background:transparent;border-bottom:1px solid var(–border2);
}
.trade-detail td{padding:7px 10px;border-bottom:1px solid var(–border2)}

/* ── MODAL ── */
.modal-bg{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.74);
z-index:500;align-items:center;justify-content:center;
backdrop-filter:blur(4px);
}
.modal-bg.open{display:flex}
.modal{
background:#131726 !important;border:1px solid rgba(200,169,110,.16);border-radius:14px;
padding:30px;width:min(560px,95vw);box-shadow:0 16px 60px rgba(0,0,0,.6);
max-height:90vh;overflow-y:auto;
}
.modal-title{
font-family:var(–font-serif);font-size:21px;
color:#e2c99a !important;margin-bottom:24px;font-weight:700;
}
.f-grid{display:flex;flex-direction:column;gap:16px}
.f-row{display:flex;gap:14px;flex-wrap:wrap}
.f-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:110px}
.f-group.full{flex:100%}
.f-lbl{font-size:10px;letter-spacing:2px;color:#6b7691 !important;text-transform:uppercase}
.f-inp{
background:#191e30 !important;border:1px solid rgba(200,169,110,.16);color:#e6e1d8 !important;
padding:10px 14px;border-radius:8px;font-family:var(–font-sans);
font-size:15px;outline:none;width:100%;transition:border-color .18s;
}
.f-inp:focus{border-color:#c8a96e !important;box-shadow:0 0 0 2px rgba(200,169,110,.12)}
.f-hint{font-size:11px;color:#6b7691 !important;margin-top:2px}
.prev-box{
background:rgba(200,169,110,.06);border:1px solid var(–gold-bd);
border-radius:8px;padding:12px 16px;font-size:14px;
color:#e2c99a !important;display:none;line-height:1.9;
}
.modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.ok-btn{
background:linear-gradient(135deg,#c8a96e 0%,#7a5020 100%) !important;
color:#0c0f1a !important;border:none !important;padding:12px 30px !important;border-radius:8px !important;
font-family:var(–font-sans) !important;font-size:15px !important;font-weight:700 !important;
cursor:pointer !important;text-decoration:none !important;outline:none !important;
}
.ok-btn:hover{opacity:.88 !important}
.no-btn{
background:#191e30 !important;border:1px solid rgba(200,169,110,.16) !important;color:#6b7691 !important;
padding:12px 22px !important;border-radius:8px !important;cursor:pointer !important;
font-size:15px !important;font-family:var(–font-sans) !important;
text-decoration:none !important;outline:none !important;
}

/* misc */
.gold-line{height:1px;background:linear-gradient(90deg,transparent,rgba(200,169,110,.38),transparent);margin:4px 0 20px}
.tip{font-size:12px;color:#6b7691 !important;padding:10px 22px;border-top:1px solid var(–border2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0c0f1a !important}
::-webkit-scrollbar-thumb{background:rgba(200,169,110,.24);border-radius:3px}
</style>

</head>

const holdCost = p => +(p.cost  * p.shares).toFixed(0);
const mv       = p => +(p.price * p.shares).toFixed(0);
const ep       = p => mv(p) - holdCost(p);
const eroi     = p => holdCost(p) ? +((ep(p)/holdCost(p))*100).toFixed(2) : 0;

const totalClosed  = ()=> closedTrades.reduce((s,t)=>s+t.profit,0);
const totalOpenEst = ()=> openPos.filter(p=>p.product!=='公勝保經').reduce((s,p)=>s+ep(p),0);
const wins     = ()=> closedTrades.filter(t=>t.profit>0).length;
const winRate  = ()=> closedTrades.length?(wins()/closedTrades.length*100).toFixed(1):'0.0';
const avgRoi   = ()=> closedTrades.length?(closedTrades.reduce((s,t)=>s+t.roi,0)/closedTrades.length).toFixed(1):'0.0';
const bestTrade= ()=> [...closedTrades].sort((a,b)=>b.profit-a.profit)[0];

const fmt  = (n,d=0) => (+n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct  = n => `${n>=0?'+':''}${(+n).toFixed(2)}%`;
const pc   = n => n>=0?'cp':'cl';
const bdg  = (n,txt) => `<span class="bdg ${n>=0?'bdg-p':'bdg-l'}">${txt}</span>`;

const calcProfit = (b,s,sh) => +((s-b)*sh).toFixed(0);
const calcRoi    = (b,s)    => b ? +(((s-b)/b)*100).toFixed(2) : 0;

// ── Mouse / Desktop drag events ──────────────────────────────
function onDragStart(e, id){
  dragSrcId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(()=>e.target.classList.add('dragging'), 0);
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const row=e.currentTarget;
  if(+row.dataset.id!==dragSrcId) row.classList.add('drag-over');
}
function onDragLeave(e){ e.currentTarget.classList.remove('drag-over') }
function onDrop(e, targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragSrcId===null||dragSrcId===targetId) return;
  const fromIdx=openPos.findIndex(p=>p.id===dragSrcId);
  const toIdx  =openPos.findIndex(p=>p.id===targetId);
  if(fromIdx<0||toIdx<0) return;
  const [moved]=openPos.splice(fromIdx,1);
  openPos.splice(toIdx,0,moved);
  renderOpenRows();
}
function onDragEnd(e){
  e.target.classList.remove('dragging');
  document.querySelectorAll('#open-body tr').forEach(r=>r.classList.remove('drag-over'));
  dragSrcId=null;
}

// ── Touch drag (iOS / iPad) ──────────────────────────────────
function initTouchDrag(){
  const tbody=document.getElementById('open-body'); if(!tbody) return;
  let touchSrcId=null, clone=null, startY=0, lastOver=null;

  tbody.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('touchstart', e=>{
      const row=handle.closest('tr');
      if(!row||row.draggable===false) return; // skip edit-mode rows
      touchSrcId=+row.dataset.id;
      startY=e.touches[0].clientY;

      // ghost clone
      clone=row.cloneNode(true);
      clone.style.cssText=`position:fixed;left:${row.getBoundingClientRect().left}px;
        top:${row.getBoundingClientRect().top}px;width:${row.offsetWidth}px;
        opacity:.75;pointer-events:none;z-index:999;
        background:rgba(200,169,110,.15);border:1px solid #c8a96e;border-radius:6px;`;
      document.body.appendChild(clone);
      row.classList.add('dragging');
      e.preventDefault();
    },{passive:false});

    handle.addEventListener('touchmove', e=>{
      if(!clone||touchSrcId===null) return;
      const touch=e.touches[0];
      clone.style.top=(touch.clientY-30)+'px';

      // find which row we're over
      clone.style.display='none';
      const el=document.elementFromPoint(touch.clientX, touch.clientY);
      clone.style.display='';
      const overRow=el?.closest('tr[data-id]');

      if(lastOver&&lastOver!==overRow) lastOver.classList.remove('drag-over');
      if(overRow&&+overRow.dataset.id!==touchSrcId){
        overRow.classList.add('drag-over');
        lastOver=overRow;
      }
      e.preventDefault();
    },{passive:false});

    handle.addEventListener('touchend', e=>{
      if(clone){clone.remove();clone=null}
      if(lastOver){lastOver.classList.remove('drag-over');lastOver=null}
      const srcRow=tbody.querySelector(`tr[data-id="${touchSrcId}"]`);
      if(srcRow) srcRow.classList.remove('dragging');

      if(lastOver&&touchSrcId!==null){
        const targetId=+lastOver.dataset.id;
        const fromIdx=openPos.findIndex(p=>p.id===touchSrcId);
        const toIdx  =openPos.findIndex(p=>p.id===targetId);
        if(fromIdx>=0&&toIdx>=0){
          const [moved]=openPos.splice(fromIdx,1);
          openPos.splice(toIdx,0,moved);
          renderOpenRows();
        }
      }
      touchSrcId=null;
    });
  });
}

function startEditOpen(id){editingOpen.add(id);renderOpenRows()}
function saveOpen(id){
  const p=openPos.find(o=>o.id===id); if(!p) return;
  p.product=document.getElementById('pn-'+id)?.value.trim()||p.product;
  p.shares =+document.getElementById('ps-'+id)?.value||p.shares;
  p.price  =+document.getElementById('pp-'+id)?.value||p.price;
  p.cost   =+document.getElementById('pc-'+id)?.value||p.cost;
  editingOpen.delete(id); renderOpenRows(); updateHeader();
  if(!document.getElementById('pv-overview').style.display) renderOverview();
}
function delOpen(id){
  if(!confirm('確定刪除此部位？')) return;
  openPos=openPos.filter(p=>p.id!==id); editingOpen.delete(id);
  renderOpenRows(); updateHeader();
}

function saveClosed(id){
  const t=closedTrades.find(x=>x.id===id); if(!t) return;
  t.date  =document.getElementById('cd-'+id)?.value||t.date;
  t.name  =document.getElementById('cn-'+id)?.value.trim()||t.name;
  t.buyP  =+document.getElementById('cbp-'+id)?.value||t.buyP;
  t.sellP =+document.getElementById('csp-'+id)?.value||t.sellP;
  t.shares=+document.getElementById('csh-'+id)?.value||t.shares;
  t.profit=calcProfit(t.buyP,t.sellP,t.shares);
  t.roi   =calcRoi(t.buyP,t.sellP);
  editingClosed.delete(id); renderClosedRows(); updateHeader();
  if(!document.getElementById('pv-overview').style.display) renderOverview();
}
function delClosed(id){
  if(!confirm('確定刪除？')) return;
  closedTrades=closedTrades.filter(t=>t.id!==id); editingClosed.delete(id);
  renderClosedRows(); updateHeader();
  if(!document.getElementById('pv-overview').style.display) renderOverview();
}

// ═══════════ CHART ══════════════════════════════════════════
let chartInst=null, chartMode='cumulative', dateFrom='', dateTo='';
function buildChartData(){
  const byDate={};
  closedTrades.forEach(t=>{
    if(!byDate[t.date]) byDate[t.date]={daily:0,trades:[]};
    byDate[t.date].daily+=t.profit;
    byDate[t.date].trades.push(t);
  });
  const norm=s=>s.replace(/[-/]/g,'');
  let rows=Object.keys(byDate).sort().map(d=>({
    fullDate:d, label:d.slice(5),
    daily:byDate[d].daily,
    trades:byDate[d].trades,
    cumulative:0,
  }));
  if(dateFrom) rows=rows.filter(r=>norm(r.fullDate)>=norm(dateFrom));
  if(dateTo)   rows=rows.filter(r=>norm(r.fullDate)<=norm(dateTo));
  let c=0; return rows.map(r=>{c+=r.daily;return{...r,cumulative:c,count:r.trades.length}});
}
function renderChart(){
  document.getElementById('pv-chart').innerHTML=`
  <div class="chart-ctrl">
    <div class="cg-wrap"><span class="cg-lbl">圖表類型</span>
      <div class="tog-row">
        <button class="tog ${chartMode==='cumulative'?'active':''}" onclick="setMode('cumulative')">📈 累計走勢</button>
        <button class="tog ${chartMode==='daily'?'active':''}" onclick="setMode('daily')">📊 每日損益</button>
      </div>
    </div>
    <div class="cg-wrap"><span class="cg-lbl">起始日期</span>
      <input type="date" class="date-inp" id="df" value="${dateFrom}" onchange="setDF(this.value)"/></div>
    <div class="cg-wrap"><span class="cg-lbl">結束日期</span>
      <input type="date" class="date-inp" id="dt" value="${dateTo}" onchange="setDT(this.value)"/></div>
    <div class="cg-wrap" style="padding-bottom:1px"><span class="cg-lbl">&nbsp;</span>
      <button class="clr-btn" onclick="clearDates()">✕ 清除</button></div>
  </div>
  <div class="filter-banner" id="fb"></div>
  <div class="sec">
    <div class="sec-hd">
      <span class="sec-title" id="ct-title">累計損益走勢</span>
      <span class="sec-sub" id="ct-sub"></span>
    </div>
    <div class="cw"><canvas id="mc" height="260"></canvas></div>
  </div>
  <div class="sec">
    <div class="sec-hd"><span class="sec-title">各交易日明細（含買賣明細）</span></div>
    <div class="tw" id="chart-detail"></div>
  </div>`;
  drawChart();
}
function drawChart(){
  const data=buildChartData();
  const fb=document.getElementById('fb');
  if(fb){
    if(dateFrom||dateTo){
      fb.style.display='block';
      fb.textContent=`篩選範圍：${dateFrom||'最早'} ～ ${dateTo||'最新'}　共 ${data.length} 個交易日`;
    } else fb.style.display='none';
  }
  const tEl=document.getElementById('ct-title');
  if(tEl) tEl.textContent=chartMode==='cumulative'?'累計損益走勢':'每日損益';
  const rangeSum=data.reduce((s,r)=>s+r.daily,0);
  const sEl=document.getElementById('ct-sub');
  if(sEl&&data.length) sEl.innerHTML=`範圍合計：<span style="color:${rangeSum>=0?'#22c55e':'#f43f5e'};font-weight:700">${rangeSum>=0?'+':''}${fmt(rangeSum)}</span>`;
  document.querySelectorAll('.tog').forEach((b,i)=>b.classList.toggle('active',[chartMode==='cumulative',chartMode==='daily'][i]));

  if(chartInst){chartInst.destroy();chartInst=null}
  const ctx=document.getElementById('mc'); if(!ctx) return;
  const labels=data.map(d=>d.label);
  const daily=data.map(d=>d.daily);
  const cumul=data.map(d=>d.cumulative);
  const G='rgba(200,169,110,';

  if(chartMode==='cumulative'){
    chartInst=new Chart(ctx,{type:'line',data:{labels,datasets:[{
      label:'累計損益',data:cumul,
      borderColor:G+'0.9)',backgroundColor:G+'0.07)',
      pointBackgroundColor:G+'1)',pointRadius:5,pointHoverRadius:8,
      borderWidth:2.5,fill:true,tension:.35}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#1d2238',borderColor:G+'0.4)',borderWidth:1,
          titleColor:'#e2c99a',bodyColor:'#e6e1d8',padding:10,
          callbacks:{label:c=>`累計：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}}},
        scales:{x:{grid:{color:G+'0.07)'},ticks:{color:'#6b7691',font:{size:12}}},
                y:{grid:{color:G+'0.07)'},ticks:{color:'#6b7691',font:{size:12}}}}}});
  } else {
    chartInst=new Chart(ctx,{type:'bar',data:{labels,datasets:[{
      label:'每日損益',data:daily,
      backgroundColor:daily.map(v=>v>=0?'rgba(34,197,94,.4)':'rgba(244,63,94,.4)'),
      borderColor:daily.map(v=>v>=0?'rgba(34,197,94,.85)':'rgba(244,63,94,.85)'),
      borderWidth:1.5,borderRadius:5}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#1d2238',borderColor:G+'0.4)',borderWidth:1,
          titleColor:'#e2c99a',bodyColor:'#e6e1d8',padding:10,
          callbacks:{label:c=>`當日：${c.raw>=0?'+':''}${c.raw.toLocaleString()} 元`}}},
        scales:{x:{grid:{color:G+'0.07)'},ticks:{color:'#6b7691',font:{size:12}}},
                y:{grid:{color:G+'0.07)'},ticks:{color:'#6b7691',font:{size:12}}}},
        animation:{onComplete:()=>{
          if(!chartInst) return;
          const meta=chartInst.getDatasetMeta(0),c2=chartInst.ctx;
          c2.save();c2.font='bold 12px -apple-system,BlinkMacSystemFont,Helvetica Neue,Arial,sans-serif';c2.textAlign='center';
          meta.data.forEach((bar,i)=>{
            const v=daily[i];
            c2.fillStyle=v>=0?'#22c55e':'#f43f5e';
            c2.fillText((v>=0?'+':'')+v.toLocaleString(),bar.x,v>=0?bar.y-6:bar.y+bar.height+15);
          });
          c2.restore();
        }}
      }});
  }

  // Detail table with sub-rows
  const det=document.getElementById('chart-detail'); if(!det) return;
  det.innerHTML=`<table>
    <thead><tr>
      <th>日期</th><th>當日損益</th><th>累計損益</th><th>筆數</th>
    </tr></thead>
    <tbody>${data.map(r=>`
      <tr style="background:${r.daily>=0?'var(--profit-bg)':'var(--loss-bg)'}">
        <td class="td-date" style="font-weight:600">${r.fullDate}</td>
        <td>${bdg(r.daily,(r.daily>=0?'+':'')+fmt(r.daily))}</td>
        <td class="${pc(r.cumulative)}" style="font-weight:700">${r.cumulative>=0?'+':''}${fmt(r.cumulative)}</td>
        <td class="cm">${r.count}</td>
      </tr>
      <tr style="background:${r.daily>=0?'rgba(34,197,94,.02)':'rgba(244,63,94,.02)'}">
        <td colspan="4" style="padding:4px 15px 14px 28px">
          <div class="trade-detail"><table style="width:100%">
            <thead><tr>
              <th>商品</th><th>買進均價</th><th>賣出均價</th><th>股數</th><th>損益</th><th>獲利率</th>
            </tr></thead>
            <tbody>${r.trades.map(t=>`<tr>
              <td class="td-name" style="font-size:13px">${t.name}</td>
              <td class="cm" style="font-size:13px">${t.buyP}</td>
              <td class="cm" style="font-size:13px">${t.sellP}</td>
              <td class="cm" style="font-size:13px">${fmt(t.shares)}</td>
              <td>${bdg(t.profit,(t.profit>=0?'+':'')+fmt(t.profit))}</td>
              <td class="${pc(t.roi)}" style="font-weight:700;font-size:13px">${pct(t.roi)}</td>
            </tr>`).join('')}</tbody>
          </table></div>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}
function setMode(m){chartMode=m;drawChart()}
function setDF(v){dateFrom=v;drawChart()}
function setDT(v){dateTo=v;drawChart()}
function clearDates(){
  dateFrom='';dateTo='';
  const a=document.getElementById('df'),b=document.getElementById('dt');
  if(a)a.value='';if(b)b.value='';drawChart();
}

// ═══════════ EXPORT SNAPSHOT ════════════════════════════════
// Reads current in-memory data, injects it into a fresh copy of
// this page's HTML, and triggers a download.  The downloaded file
// is fully self-contained — open it anywhere without a server.
function exportSnapshot(){
  const src = document.documentElement.outerHTML;

  // Serialise current live data
  const openJSON   = JSON.stringify(openPos,  null, 2);
  const closedJSON = JSON.stringify(closedTrades, null, 2);

  // Replace the initial data arrays in the source
  // We look for the exact variable declarations and swap them out.
  let out = src;

  // Replace openPos array
  out = out.replace(
    /let openPos\s*=\s*\[[\s\S]*?\];(?=\s*\n)/,
    `let openPos = ${openJSON};`
  );
  // Replace closedTrades array
  out = out.replace(
    /let closedTrades\s*=\s*\[[\s\S]*?\];(?=\s*\n)/,
    `let closedTrades = ${closedJSON};`
  );

  // Also update nextOpenId / nextCloseId so new additions don't collide
  out = out.replace(
    /let nextOpenId\s*=\s*\d+/,
    `let nextOpenId=${Math.max(...openPos.map(p=>p.id),20)+1}`
  );
  out = out.replace(
    /let nextCloseId\s*=\s*\d+/,
    `let nextCloseId=${Math.max(...closedTrades.map(t=>t.id),30)+1}`
  );

  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const filename = `warrant-ledger-${today}.html`;

  const blob = new Blob([out], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
